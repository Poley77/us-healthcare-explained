<svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Five Data Sources in VBC</title>
  <rect width="820" height="260" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">The Five Data Sources in VBC</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#6b7280">Each tells a different part of the patient story — none tells the whole story alone</text>

  <!-- Claims -->
  <rect x="14" y="56" width="146" height="156" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="87" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Claims</text>
  <line x1="24" y1="84" x2="150" y2="84" stroke="#bfdbfe" stroke-width="1"/>
  <text x="87" y="100" text-anchor="middle" font-size="9.5" fill="#374151">Diagnoses (ICD-10)</text>
  <text x="87" y="114" text-anchor="middle" font-size="9.5" fill="#374151">Procedures (CPT)</text>
  <text x="87" y="128" text-anchor="middle" font-size="9.5" fill="#374151">Costs incurred</text>
  <text x="87" y="142" text-anchor="middle" font-size="9.5" fill="#374151">Dates of service</text>
  <text x="87" y="156" text-anchor="middle" font-size="9.5" fill="#374151">Provider used</text>
  <line x1="24" y1="168" x2="150" y2="168" stroke="#bfdbfe" stroke-width="1"/>
  <text x="87" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Lag: 30–90 days</text>
  <text x="87" y="196" text-anchor="middle" font-size="9" fill="#6b7280">Complete view of</text>
  <text x="87" y="208" text-anchor="middle" font-size="9" fill="#6b7280">all utilization</text>

  <!-- EHR -->
  <rect x="170" y="56" width="146" height="156" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="243" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">EHR</text>
  <line x1="180" y1="84" x2="306" y2="84" stroke="#bbf7d0" stroke-width="1"/>
  <text x="243" y="100" text-anchor="middle" font-size="9.5" fill="#374151">Clinical notes</text>
  <text x="243" y="114" text-anchor="middle" font-size="9.5" fill="#374151">Medications</text>
  <text x="243" y="128" text-anchor="middle" font-size="9.5" fill="#374151">Lab results</text>
  <text x="243" y="142" text-anchor="middle" font-size="9.5" fill="#374151">Vitals / BMI</text>
  <text x="243" y="156" text-anchor="middle" font-size="9.5" fill="#374151">Problem list</text>
  <line x1="180" y1="168" x2="306" y2="168" stroke="#bbf7d0" stroke-width="1"/>
  <text x="243" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Near real-time</text>
  <text x="243" y="196" text-anchor="middle" font-size="9" fill="#6b7280">Richest clinical</text>
  <text x="243" y="208" text-anchor="middle" font-size="9" fill="#6b7280">detail available</text>

  <!-- Lab / Rx -->
  <rect x="326" y="56" width="146" height="156" rx="9" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="399" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Lab / Rx</text>
  <line x1="336" y1="84" x2="462" y2="84" stroke="#fed7aa" stroke-width="1"/>
  <text x="399" y="100" text-anchor="middle" font-size="9.5" fill="#374151">Lab test results</text>
  <text x="399" y="114" text-anchor="middle" font-size="9.5" fill="#374151">Reference ranges</text>
  <text x="399" y="128" text-anchor="middle" font-size="9.5" fill="#374151">Medication fills</text>
  <text x="399" y="142" text-anchor="middle" font-size="9.5" fill="#374151">Adherence data</text>
  <text x="399" y="156" text-anchor="middle" font-size="9.5" fill="#374151">Drug interactions</text>
  <line x1="336" y1="168" x2="462" y2="168" stroke="#fed7aa" stroke-width="1"/>
  <text x="399" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Days to report</text>
  <text x="399" y="196" text-anchor="middle" font-size="9" fill="#6b7280">Critical for chronic</text>
  <text x="399" y="208" text-anchor="middle" font-size="9" fill="#6b7280">disease management</text>

  <!-- ADT Feeds -->
  <rect x="482" y="56" width="146" height="156" rx="9" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="555" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">ADT Feeds</text>
  <line x1="492" y1="84" x2="618" y2="84" stroke="#ddd6fe" stroke-width="1"/>
  <text x="555" y="100" text-anchor="middle" font-size="9.5" fill="#374151">Admissions</text>
  <text x="555" y="114" text-anchor="middle" font-size="9.5" fill="#374151">Discharges</text>
  <text x="555" y="128" text-anchor="middle" font-size="9.5" fill="#374151">Transfers</text>
  <text x="555" y="142" text-anchor="middle" font-size="9.5" fill="#374151">ER visits</text>
  <text x="555" y="156" text-anchor="middle" font-size="9.5" fill="#374151">Care setting</text>
  <line x1="492" y1="168" x2="618" y2="168" stroke="#ddd6fe" stroke-width="1"/>
  <text x="555" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Near real-time</text>
  <text x="555" y="196" text-anchor="middle" font-size="9" fill="#6b7280">Critical for post-</text>
  <text x="555" y="208" text-anchor="middle" font-size="9" fill="#6b7280">acute follow-up</text>

  <!-- SDOH / Survey -->
  <rect x="638" y="56" width="168" height="156" rx="9" fill="#fef9ee" stroke="#fde68a" stroke-width="1.5"/>
  <text x="722" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">SDOH / Survey</text>
  <line x1="648" y1="84" x2="796" y2="84" stroke="#fde68a" stroke-width="1"/>
  <text x="722" y="100" text-anchor="middle" font-size="9.5" fill="#374151">Housing status</text>
  <text x="722" y="114" text-anchor="middle" font-size="9.5" fill="#374151">Food security</text>
  <text x="722" y="128" text-anchor="middle" font-size="9.5" fill="#374151">Transportation</text>
  <text x="722" y="142" text-anchor="middle" font-size="9.5" fill="#374151">Patient-reported</text>
  <text x="722" y="156" text-anchor="middle" font-size="9.5" fill="#374151">HRA responses</text>
  <line x1="648" y1="168" x2="796" y2="168" stroke="#fde68a" stroke-width="1"/>
  <text x="722" y="182" text-anchor="middle" font-size="9" fill="#6b7280">Periodic / ad hoc</text>
  <text x="722" y="196" text-anchor="middle" font-size="9" fill="#6b7280">Increasingly used</text>
  <text x="722" y="208" text-anchor="middle" font-size="9" fill="#6b7280">in VBC contracts</text>

  <!-- Footer bar -->
  <rect x="14" y="222" width="792" height="30" rx="8" fill="#1e3a8a"/>
  <text x="410" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">All five feed into the analytics platform</text>
  <text x="410" y="247" text-anchor="middle" font-size="10" fill="#bfdbfe">No single source gives a complete picture — the value of analytics is in combining them</text>
</svg>
