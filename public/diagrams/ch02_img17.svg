<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Which Path Are You On? — Your Complete Coverage Map</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ca8a04"/>
    </marker>
  </defs>
  <rect width="760" height="360" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">Which Path Are You On?</text>
  <text x="380" y="41" text-anchor="middle" font-size="11" fill="#6b7280">Five paths determined by age, employer, and income</text>

  <!-- Start: Are you 65+? -->
  <rect x="290" y="50" width="180" height="32" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="380" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Are you 65 or older?</text>
  <text x="380" y="76" text-anchor="middle" font-size="9.5" fill="#d1d5db">or qualify by disability</text>

  <!-- 65+ yes → right -->
  <line x1="470" y1="66" x2="560" y2="66" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <text x="515" y="61" text-anchor="middle" font-size="9.5" fill="#ca8a04">Yes →</text>

  <!-- Medicare split box -->
  <rect x="560" y="50" width="186" height="32" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="653" y="63" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">You're on Medicare</text>
  <text x="653" y="77" text-anchor="middle" font-size="9.5" fill="#78350f">→ choose pathway below</text>

  <!-- 65+ → two Medicare paths -->
  <line x1="653" y1="82" x2="653" y2="100" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- Path 4: Original Medicare -->
  <rect x="560" y="100" width="86" height="110" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="603" y="116" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e3a8a">PATH 4</text>
  <text x="603" y="130" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">Original</text>
  <text x="603" y="143" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">Medicare</text>
  <text x="603" y="157" text-anchor="middle" font-size="9" fill="#374151">+ Medigap</text>
  <text x="603" y="170" text-anchor="middle" font-size="9" fill="#374151">+ Part D</text>
  <text x="603" y="185" text-anchor="middle" font-size="8.5" fill="#6b7280">nationwide</text>
  <text x="603" y="197" text-anchor="middle" font-size="8.5" fill="#6b7280">freedom</text>

  <!-- Path 5: Medicare Advantage -->
  <rect x="660" y="100" width="86" height="110" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="703" y="116" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">PATH 5</text>
  <text x="703" y="130" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Medicare</text>
  <text x="703" y="143" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Advantage</text>
  <text x="703" y="157" text-anchor="middle" font-size="9" fill="#374151">Part C</text>
  <text x="703" y="170" text-anchor="middle" font-size="9" fill="#374151">often $0 extra</text>
  <text x="703" y="185" text-anchor="middle" font-size="8.5" fill="#6b7280">local network</text>
  <text x="703" y="197" text-anchor="middle" font-size="8.5" fill="#6b7280">OOP cap</text>

  <!-- Under 65 branch: No → down -->
  <line x1="380" y1="82" x2="380" y2="108" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="336" y="78" text-anchor="middle" font-size="9.5" fill="#9ca3af">← No</text>

  <!-- Employer question -->
  <rect x="260" y="108" width="240" height="32" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="380" y="121" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Does your employer offer</text>
  <text x="380" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">health insurance?</text>

  <!-- Employer Yes → right -->
  <line x1="500" y1="124" x2="560" y2="124" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <text x="530" y="118" text-anchor="middle" font-size="9.5" fill="#ca8a04">Yes →</text>

  <!-- Path 1: Employer -->
  <rect x="560" y="104" width="186" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="653" y="119" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">PATH 1 — Employer Coverage</text>
  <text x="653" y="134" text-anchor="middle" font-size="9.5" fill="#374151">Employer pays 70–80% · pre-tax · best deal</text>

  <!-- Employer No → down -->
  <line x1="380" y1="140" x2="380" y2="162" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="336" y="158" text-anchor="middle" font-size="9.5" fill="#9ca3af">← No</text>

  <!-- Income question -->
  <rect x="244" y="162" width="272" height="32" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="380" y="175" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Annual household income?</text>
  <text x="380" y="189" text-anchor="middle" font-size="10" fill="#d1d5db">Single adult; ~138% FPL = $22,025</text>

  <!-- Below threshold → left -->
  <line x1="244" y1="178" x2="164" y2="178" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="202" y="172" text-anchor="middle" font-size="9.5" fill="#16a34a">Below $22K →</text>

  <!-- Path 2: Medicaid -->
  <rect x="14" y="158" width="150" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="89" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">PATH 2</text>
  <text x="89" y="189" text-anchor="middle" font-size="9.5" font-weight="600" fill="#14532d">Medicaid</text>
  <text x="89" y="203" text-anchor="middle" font-size="9" fill="#374151">Free/near-free</text>
  <text x="89" y="215" text-anchor="middle" font-size="8.5" fill="#6b7280">41 expansion states</text>

  <!-- Above threshold → right -->
  <line x1="516" y1="178" x2="560" y2="178" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="540" y="172" text-anchor="middle" font-size="9.5" fill="#2563eb">Above →</text>

  <!-- Path 3: ACA Marketplace -->
  <rect x="560" y="154" width="186" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="653" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">PATH 3 — ACA Marketplace</text>
  <text x="653" y="184" text-anchor="middle" font-size="9.5" fill="#374151">Income-scaled subsidies</text>
  <text x="653" y="197" text-anchor="middle" font-size="9" fill="#6b7280">Healthcare.gov routes you</text>

  <!-- Coverage gap warning -->
  <rect x="14" y="228" width="150" height="32" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="89" y="243" text-anchor="middle" font-size="9" fill="#7f1d1d">⚠ 10 non-expansion</text>
  <text x="89" y="256" text-anchor="middle" font-size="9" fill="#7f1d1d">states: coverage gap</text>

  <!-- Summary table bottom -->
  <rect x="14" y="270" width="732" height="78" rx="10" fill="#fff" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="#111">At a glance</text>
  <text x="89" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#3730a3">1. Employer</text>
  <text x="89" y="317" text-anchor="middle" font-size="9" fill="#374151">Best subsidy, limited choice</text>
  <text x="234" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">2. Medicaid</text>
  <text x="234" y="317" text-anchor="middle" font-size="9" fill="#374151">Low income, no employer</text>
  <text x="380" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">3. ACA Marketplace</text>
  <text x="380" y="317" text-anchor="middle" font-size="9" fill="#374151">Moderate income, no employer</text>
  <text x="555" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">4. Medicare + Medigap</text>
  <text x="555" y="317" text-anchor="middle" font-size="9" fill="#374151">65+, nationwide freedom</text>
  <text x="684" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">5. Medicare Advantage</text>
  <text x="684" y="317" text-anchor="middle" font-size="9" fill="#374151">65+, lower cost, local</text>
  <line x1="30" y1="328" x2="726" y2="328" stroke="#f0f0f0" stroke-width="1"/>
  <text x="380" y="342" text-anchor="middle" font-size="9.5" fill="#6b7280">Understanding your path is the foundation for every payment model and contract structure in the chapters ahead</text>
</svg>
