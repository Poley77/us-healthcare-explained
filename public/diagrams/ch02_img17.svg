<svg viewBox="0 0 860 370" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Which Path Are You On? — Your Complete Coverage Map</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ca8a04"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="860" height="370" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="430" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">Which Path Are You On?</text>
  <text x="430" y="41" text-anchor="middle" font-size="11" fill="#6b7280">Five paths determined by age, employer, and income</text>

  <!-- ── Decision flow (left/centre column) ── -->

  <!-- Are you 65+? -->
  <rect x="270" y="52" width="200" height="34" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="370" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Are you 65 or older?</text>
  <text x="370" y="80" text-anchor="middle" font-size="9.5" fill="#d1d5db">or qualify by disability</text>

  <!-- Yes → right to Medicare box -->
  <line x1="470" y1="69" x2="528" y2="69" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <text x="499" y="64" text-anchor="middle" font-size="9" fill="#ca8a04">Yes →</text>

  <!-- Medicare gateway box -->
  <rect x="528" y="52" width="160" height="34" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="608" y="66" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">You're on Medicare</text>
  <text x="608" y="80" text-anchor="middle" font-size="9" fill="#92400e">→ choose pathway below</text>

  <!-- Medicare gateway → Path 4 & 5 -->
  <line x1="608" y1="86" x2="608" y2="106" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- PATH 4 -->
  <rect x="528" y="106" width="100" height="110" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="578" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e3a8a">PATH 4</text>
  <text x="578" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">Original</text>
  <text x="578" y="149" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">Medicare</text>
  <text x="578" y="163" text-anchor="middle" font-size="9" fill="#374151">+ Medigap</text>
  <text x="578" y="176" text-anchor="middle" font-size="9" fill="#374151">+ Part D</text>
  <text x="578" y="191" text-anchor="middle" font-size="8.5" fill="#6b7280">Nationwide</text>
  <text x="578" y="203" text-anchor="middle" font-size="8.5" fill="#6b7280">freedom</text>

  <!-- PATH 5 -->
  <rect x="640" y="106" width="106" height="110" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="693" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#14532d">PATH 5</text>
  <text x="693" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Medicare</text>
  <text x="693" y="149" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Advantage</text>
  <text x="693" y="163" text-anchor="middle" font-size="9" fill="#374151">Part C</text>
  <text x="693" y="176" text-anchor="middle" font-size="9" fill="#374151">often $0 extra</text>
  <text x="693" y="191" text-anchor="middle" font-size="8.5" fill="#6b7280">Local network</text>
  <text x="693" y="203" text-anchor="middle" font-size="8.5" fill="#6b7280">OOP cap</text>

  <!-- No → down from age question -->
  <line x1="370" y1="86" x2="370" y2="116" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="328" y="104" text-anchor="middle" font-size="9" fill="#9ca3af">No ↓</text>

  <!-- Employer question -->
  <rect x="246" y="116" width="248" height="34" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="370" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Does your employer offer</text>
  <text x="370" y="144" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">health insurance?</text>

  <!-- Employer Yes → right to PATH 1 -->
  <line x1="494" y1="133" x2="530" y2="133" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-y)"/>
  <text x="512" y="128" text-anchor="middle" font-size="9" fill="#ca8a04">Yes →</text>

  <!-- PATH 1 -->
  <rect x="530" y="116" width="216" height="34" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="638" y="130" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">PATH 1 — Employer Coverage</text>
  <text x="638" y="143" text-anchor="middle" font-size="9" fill="#374151">Employer pays 70–80% · pre-tax · best deal</text>

  <!-- Employer No → down -->
  <line x1="370" y1="150" x2="370" y2="176" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="328" y="166" text-anchor="middle" font-size="9" fill="#9ca3af">No ↓</text>

  <!-- Income question -->
  <rect x="228" y="176" width="284" height="34" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="370" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Annual household income?</text>
  <text x="370" y="204" text-anchor="middle" font-size="9.5" fill="#d1d5db">Single adult; ~138% FPL = $22,025</text>

  <!-- Below → left to PATH 2 -->
  <line x1="228" y1="193" x2="174" y2="193" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="200" y="188" text-anchor="middle" font-size="9" fill="#16a34a">Below →</text>

  <!-- PATH 2: Medicaid -->
  <rect x="14" y="166" width="160" height="60" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="94" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">PATH 2 — Medicaid</text>
  <text x="94" y="198" text-anchor="middle" font-size="9.5" fill="#374151">Free or near-free</text>
  <text x="94" y="212" text-anchor="middle" font-size="9" fill="#6b7280">41 expansion states</text>

  <!-- Above → right to PATH 3 -->
  <line x1="512" y1="193" x2="550" y2="193" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="532" y="188" text-anchor="middle" font-size="9" fill="#2563eb">Above →</text>

  <!-- PATH 3 -->
  <rect x="550" y="166" width="196" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="648" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">PATH 3 — ACA Marketplace</text>
  <text x="648" y="198" text-anchor="middle" font-size="9.5" fill="#374151">Income-scaled subsidies</text>
  <text x="648" y="212" text-anchor="middle" font-size="9" fill="#6b7280">Healthcare.gov routes you</text>

  <!-- Coverage gap warning -->
  <rect x="14" y="236" width="160" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="94" y="250" text-anchor="middle" font-size="9" fill="#7f1d1d">⚠ 10 non-expansion</text>
  <text x="94" y="262" text-anchor="middle" font-size="9" fill="#7f1d1d">states: coverage gap</text>

  <!-- ── Summary table ── -->
  <rect x="14" y="280" width="832" height="78" rx="10" fill="#fff" stroke="#e2e2dc" stroke-width="1"/>
  <text x="430" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#111">At a glance</text>

  <text x="97"  y="314" text-anchor="middle" font-size="9" font-weight="600" fill="#3730a3">1. Employer</text>
  <text x="97"  y="327" text-anchor="middle" font-size="9" fill="#374151">Best subsidy, limited choice</text>

  <text x="264" y="314" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">2. Medicaid</text>
  <text x="264" y="327" text-anchor="middle" font-size="9" fill="#374151">Low income, no employer</text>

  <text x="430" y="314" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">3. ACA Marketplace</text>
  <text x="430" y="327" text-anchor="middle" font-size="9" fill="#374151">Moderate income, no employer</text>

  <text x="614" y="314" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">4. Medicare + Medigap</text>
  <text x="614" y="327" text-anchor="middle" font-size="9" fill="#374151">65+, nationwide freedom</text>

  <text x="780" y="314" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">5. Medicare Advantage</text>
  <text x="780" y="327" text-anchor="middle" font-size="9" fill="#374151">65+, lower cost, local</text>

  <line x1="30" y1="338" x2="826" y2="338" stroke="#f0f0f0" stroke-width="1"/>
  <text x="430" y="352" text-anchor="middle" font-size="9.5" fill="#6b7280">Understanding your path is the foundation for every payment model and contract structure in the chapters ahead</text>
</svg>
