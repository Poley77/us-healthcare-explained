<svg viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Which Path Are You On? — Your Complete Coverage Map</title>
  <defs>
    <marker id="a17-grey" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9ca3af"/></marker>
    <marker id="a17-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ca8a04"/></marker>
    <marker id="a17-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="a17-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
  </defs>

  <rect width="960" height="400" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="480" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Which Path Are You On?</text>
  <text x="480" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Five paths determined by age, employer, and income</text>

  <!-- ── Left decision flow ── -->

  <!-- Q1: 65+? -->
  <rect x="300" y="58" width="210" height="36" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="405" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Are you 65 or older?</text>
  <text x="405" y="86" text-anchor="middle" font-size="9.5" fill="#d1d5db">or qualify by disability</text>

  <!-- Yes → Medicare gateway -->
  <line x1="510" y1="76" x2="574" y2="76" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#a17-amber)"/>
  <text x="542" y="70" text-anchor="middle" font-size="9" fill="#ca8a04">Yes →</text>

  <!-- Medicare gateway -->
  <rect x="574" y="58" width="170" height="36" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="659" y="72" text-anchor="middle" font-size="10.5" font-weight="600" fill="#78350f">You're on Medicare</text>
  <text x="659" y="86" text-anchor="middle" font-size="9" fill="#92400e">→ choose a pathway below</text>

  <!-- Medicare gateway → down to Path 4 & 5 -->
  <line x1="659" y1="94" x2="659" y2="116" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#a17-amber)"/>

  <!-- PATH 4 -->
  <rect x="574" y="116" width="118" height="118" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="633" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">PATH 4</text>
  <text x="633" y="149" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e3a8a">Original Medicare</text>
  <line x1="585" y1="157" x2="681" y2="157" stroke="#bfdbfe" stroke-width="1"/>
  <text x="633" y="170" text-anchor="middle" font-size="9" fill="#374151">Parts A + B</text>
  <text x="633" y="183" text-anchor="middle" font-size="9" fill="#374151">+ Medigap (optional)</text>
  <text x="633" y="196" text-anchor="middle" font-size="9" fill="#374151">+ standalone Part D</text>
  <text x="633" y="211" text-anchor="middle" font-size="8.5" fill="#6b7280">Nationwide freedom</text>
  <text x="633" y="225" text-anchor="middle" font-size="8.5" fill="#6b7280">higher premiums</text>

  <!-- PATH 5 -->
  <rect x="706" y="116" width="118" height="118" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="765" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">PATH 5</text>
  <text x="765" y="149" text-anchor="middle" font-size="9.5" font-weight="600" fill="#14532d">Medicare Advantage</text>
  <line x1="717" y1="157" x2="813" y2="157" stroke="#bbf7d0" stroke-width="1"/>
  <text x="765" y="170" text-anchor="middle" font-size="9" fill="#374151">Part C — all-in-one</text>
  <text x="765" y="183" text-anchor="middle" font-size="9" fill="#374151">Often $0 extra premium</text>
  <text x="765" y="196" text-anchor="middle" font-size="9" fill="#374151">Usually includes drugs</text>
  <text x="765" y="211" text-anchor="middle" font-size="8.5" fill="#6b7280">Local network</text>
  <text x="765" y="225" text-anchor="middle" font-size="8.5" fill="#6b7280">annual OOP cap ~$9,250</text>

  <!-- Q1: No → down -->
  <line x1="405" y1="94" x2="405" y2="126" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a17-grey)"/>
  <text x="370" y="113" text-anchor="middle" font-size="9" fill="#9ca3af">No ↓</text>

  <!-- Q2: Employer? -->
  <rect x="270" y="126" width="270" height="36" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="405" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Does your employer offer</text>
  <text x="405" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">health insurance?</text>

  <!-- Employer Yes → PATH 1 -->
  <line x1="540" y1="144" x2="574" y2="144" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#a17-amber)"/>
  <text x="557" y="138" text-anchor="middle" font-size="9" fill="#ca8a04">Yes →</text>

  <!-- PATH 1 -->
  <rect x="574" y="126" width="250" height="36" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="699" y="141" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3730a3">PATH 1 — Employer Coverage</text>
  <text x="699" y="155" text-anchor="middle" font-size="9.5" fill="#374151">Employer pays 70–80% · pre-tax · usually best deal</text>

  <!-- Q2: No → down -->
  <line x1="405" y1="162" x2="405" y2="196" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a17-grey)"/>
  <text x="370" y="182" text-anchor="middle" font-size="9" fill="#9ca3af">No ↓</text>

  <!-- Q3: Income? -->
  <rect x="252" y="196" width="306" height="36" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="405" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Annual household income?</text>
  <text x="405" y="225" text-anchor="middle" font-size="9.5" fill="#d1d5db">Single adult; 138% FPL ≈ $22,025/yr</text>

  <!-- Below → left to PATH 2 -->
  <line x1="252" y1="214" x2="200" y2="214" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a17-green)"/>
  <text x="224" y="208" text-anchor="middle" font-size="9" fill="#16a34a">Below →</text>

  <!-- PATH 2: Medicaid -->
  <rect x="20" y="186" width="180" height="70" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="110" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">PATH 2 — Medicaid</text>
  <text x="110" y="220" text-anchor="middle" font-size="9.5" fill="#374151">Free or near-free</text>
  <text x="110" y="235" text-anchor="middle" font-size="9" fill="#374151">Minimal copays</text>
  <text x="110" y="249" text-anchor="middle" font-size="8.5" fill="#6b7280">41 expansion states</text>

  <!-- Coverage gap warning -->
  <rect x="20" y="266" width="180" height="34" rx="7" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="110" y="281" text-anchor="middle" font-size="9" fill="#7f1d1d">⚠ 10 non-expansion states</text>
  <text x="110" y="295" text-anchor="middle" font-size="9" fill="#7f1d1d">have a coverage gap</text>

  <!-- Above → right to PATH 3 -->
  <line x1="558" y1="214" x2="592" y2="214" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a17-blue)"/>
  <text x="575" y="208" text-anchor="middle" font-size="9" fill="#2563eb">Above →</text>

  <!-- PATH 3 -->
  <rect x="592" y="186" width="232" height="70" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="708" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">PATH 3 — ACA Marketplace</text>
  <text x="708" y="220" text-anchor="middle" font-size="9.5" fill="#374151">Income-scaled premium subsidies</text>
  <text x="708" y="235" text-anchor="middle" font-size="9" fill="#374151">CSRs for Silver plans (low income)</text>
  <text x="708" y="249" text-anchor="middle" font-size="8.5" fill="#6b7280">Healthcare.gov routes you automatically</text>

  <!-- ── Summary table ── -->
  <rect x="20" y="318" width="920" height="70" rx="10" fill="#fff" stroke="#e2e2dc" stroke-width="1"/>
  <text x="480" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#111">At a glance</text>

  <text x="100"  y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#3730a3">1. Employer</text>
  <text x="100"  y="364" text-anchor="middle" font-size="9" fill="#374151">Best subsidy</text>
  <text x="100"  y="376" text-anchor="middle" font-size="9" fill="#374151">limited choice</text>

  <text x="282" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">2. Medicaid</text>
  <text x="282" y="364" text-anchor="middle" font-size="9" fill="#374151">Low income</text>
  <text x="282" y="376" text-anchor="middle" font-size="9" fill="#374151">no employer</text>

  <text x="480" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">3. ACA Marketplace</text>
  <text x="480" y="364" text-anchor="middle" font-size="9" fill="#374151">Moderate income</text>
  <text x="480" y="376" text-anchor="middle" font-size="9" fill="#374151">no employer</text>

  <text x="686" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">4. Medicare + Medigap</text>
  <text x="686" y="364" text-anchor="middle" font-size="9" fill="#374151">65+ · nationwide</text>
  <text x="686" y="376" text-anchor="middle" font-size="9" fill="#374151">doctor freedom</text>

  <text x="880" y="352" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">5. Medicare Advantage</text>
  <text x="880" y="364" text-anchor="middle" font-size="9" fill="#374151">65+ · lower cost</text>
  <text x="880" y="376" text-anchor="middle" font-size="9" fill="#374151">local network</text>
</svg>
