<svg viewBox="0 0 780 330" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Privia Health — How It Works</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="780" height="330" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Privia Health — How It Works</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#6b7280">Multi-state physician group and VBC platform — employs physicians through PCs</text>

  <!-- Two top payers -->
  <rect x="60" y="58" width="240" height="48" rx="9" fill="#1e3a8a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="180" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">CMS / MA Plans</text>
  <text x="180" y="96" text-anchor="middle" font-size="10" fill="#bfdbfe">ACO + MA/VBC contracts</text>

  <rect x="480" y="58" width="240" height="48" rx="9" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="600" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Commercial Plans</text>
  <text x="600" y="96" text-anchor="middle" font-size="10" fill="#d1d5db">employer + individual VBC</text>

  <!-- Arrows from both payers to Privia -->
  <line x1="180" y1="106" x2="310" y2="144" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="106" x2="470" y2="144" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Privia Health Group (MSO) -->
  <rect x="80" y="146" width="620" height="88" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="390" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Privia Health Group (MSO)</text>
  <text x="390" y="186" text-anchor="middle" font-size="10" fill="#374151">centralized technology · analytics · billing · care management · payer contracting</text>
  <text x="390" y="202" text-anchor="middle" font-size="10" fill="#374151">CPOM-compliant: MSO-contracts with physician-owned PCs in each state</text>
  <text x="390" y="218" text-anchor="middle" font-size="9.5" fill="#92400e">Public company (PRVA) — cannot directly employ physicians in most states</text>

  <!-- Arrows down to three medical groups -->
  <line x1="200" y1="234" x2="170" y2="258" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="234" x2="390" y2="258" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="234" x2="610" y2="258" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Three Privia Medical Groups -->
  <rect x="30" y="260" width="210" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="135" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Privia Medical Group</text>
  <text x="135" y="294" text-anchor="middle" font-size="10" fill="#166534">Virginia / DC (PC)</text>
  <text x="135" y="306" text-anchor="middle" font-size="9.5" fill="#166534">physician-owned entity</text>

  <rect x="285" y="260" width="210" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="390" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Privia Medical Group</text>
  <text x="390" y="294" text-anchor="middle" font-size="10" fill="#166534">Texas / Georgia (PC)</text>
  <text x="390" y="306" text-anchor="middle" font-size="9.5" fill="#166534">physician-owned entity</text>

  <rect x="540" y="260" width="210" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="645" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Privia Medical Group</text>
  <text x="645" y="294" text-anchor="middle" font-size="10" fill="#166534">California / other (PC)</text>
  <text x="645" y="306" text-anchor="middle" font-size="9.5" fill="#166534">physician-owned entity</text>

  <!-- Footer note -->
  <text x="390" y="323" text-anchor="middle" font-size="9" fill="#6b7280">Key structural point: physicians are employed by Privia Medical Group PCs — state-specific, physician-owned legal entities</text>
</svg>
