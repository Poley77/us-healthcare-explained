<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How a RAF Score Is Built</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="760" height="340" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#111">How a RAF Score Is Built</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#6b7280">Each patient gets a score that adjusts CMS's monthly payment to the plan</text>

  <!-- Step boxes -->
  <!-- 1. Patient Visit (amber) -->
  <rect x="18" y="68" width="152" height="72" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="94" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Patient Visit</text>
  <text x="94" y="110" text-anchor="middle" font-size="10" fill="#92400e">Doctor documents</text>
  <text x="94" y="124" text-anchor="middle" font-size="10" fill="#92400e">diagnoses in EHR</text>

  <line x1="170" y1="104" x2="196" y2="104" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. ICD-10 Codes -->
  <rect x="198" y="68" width="152" height="72" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="274" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">ICD-10 Codes</text>
  <text x="274" y="110" text-anchor="middle" font-size="10" fill="#92400e">diagnoses translated</text>
  <text x="274" y="124" text-anchor="middle" font-size="10" fill="#92400e">into billing codes</text>

  <line x1="350" y1="104" x2="376" y2="104" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. HCC Mapping -->
  <rect x="378" y="68" width="152" height="72" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="454" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">HCC Mapping</text>
  <text x="454" y="110" text-anchor="middle" font-size="10" fill="#92400e">ICD codes mapped to</text>
  <text x="454" y="124" text-anchor="middle" font-size="10" fill="#92400e">Hierarchical Condition</text>

  <line x1="530" y1="104" x2="556" y2="104" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. RAF Score (green) -->
  <rect x="558" y="68" width="184" height="72" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="650" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">RAF Score</text>
  <text x="650" y="107" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">e.g. 1.4</text>
  <text x="650" y="128" text-anchor="middle" font-size="10" fill="#166534">= 40% above avg</text>

  <!-- HCC Table -->
  <rect x="18" y="158" width="724" height="118" rx="10" fill="#f1f5f9" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Example HCC Categories — each adds to the RAF score</text>

  <!-- Table header -->
  <line x1="18" y1="186" x2="742" y2="186" stroke="#e2e2dc" stroke-width="1"/>
  <text x="160" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">HCC Category</text>
  <text x="430" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Example Diagnosis</text>
  <text x="660" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Approx. RAF Add-on</text>
  <line x1="18" y1="206" x2="742" y2="206" stroke="#e2e2dc" stroke-width="1"/>
  <line x1="300" y1="186" x2="300" y2="276" stroke="#e2e2dc" stroke-width="1"/>
  <line x1="570" y1="186" x2="570" y2="276" stroke="#e2e2dc" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="160" y="224" text-anchor="middle" font-size="11" fill="#374151">Diabetes with complications</text>
  <text x="430" y="224" text-anchor="middle" font-size="11" fill="#374151">Type 2 DM with CKD</text>
  <text x="660" y="224" text-anchor="middle" font-size="11" fill="#374151">+0.30 – 0.40</text>

  <!-- Row 2 -->
  <rect x="18" y="230" width="724" height="22" fill="#f8fafc"/>
  <text x="160" y="245" text-anchor="middle" font-size="11" fill="#374151">Congestive heart failure</text>
  <text x="430" y="245" text-anchor="middle" font-size="11" fill="#374151">CHF, systolic, chronic</text>
  <text x="660" y="245" text-anchor="middle" font-size="11" fill="#374151">+0.35 – 0.55</text>

  <!-- Row 3 -->
  <text x="160" y="268" text-anchor="middle" font-size="11" fill="#374151">Major depression / bipolar</text>
  <text x="430" y="268" text-anchor="middle" font-size="11" fill="#374151">Severe MDD, recurrent</text>
  <text x="660" y="268" text-anchor="middle" font-size="11" fill="#374151">+0.30 – 0.45</text>

  <!-- Formula box -->
  <rect x="18" y="286" width="724" height="40" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="380" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">RAF Score Formula (simplified)</text>
  <text x="380" y="320" text-anchor="middle" font-size="10" fill="#1e40af">Base score (demographics) + Σ HCC weights = RAF Score → RAF × Base PMPM = Monthly Payment</text>
</svg>
