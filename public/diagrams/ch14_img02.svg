<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>CMS Stars Ratings — How They Work</title>
  <rect width="760" height="200" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#111">CMS Stars Ratings — How They Work</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#6b7280">Rated 1–5 stars annually · drives quality bonuses and plan attractiveness</text>

  <!-- 1 Star (red) -->
  <rect x="18" y="64" width="132" height="100" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="84" y="92" text-anchor="middle" font-size="26" fill="#fbbf24">★</text>
  <text x="84" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Poor</text>
  <text x="84" y="132" text-anchor="middle" font-size="10" fill="#991b1b">CMS may</text>
  <text x="84" y="146" text-anchor="middle" font-size="10" fill="#991b1b">terminate plan</text>

  <!-- 2 Stars (orange) -->
  <rect x="162" y="64" width="132" height="100" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="228" y="92" text-anchor="middle" font-size="18" fill="#fbbf24">★★</text>
  <text x="228" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Below average</text>
  <text x="228" y="132" text-anchor="middle" font-size="10" fill="#9a3412">Improvement</text>
  <text x="228" y="146" text-anchor="middle" font-size="10" fill="#9a3412">required</text>

  <!-- 3 Stars (yellow) -->
  <rect x="306" y="64" width="132" height="100" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="372" y="92" text-anchor="middle" font-size="14" fill="#fbbf24">★★★</text>
  <text x="372" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">Average</text>
  <text x="372" y="132" text-anchor="middle" font-size="10" fill="#854d0e">No bonus</text>
  <text x="372" y="146" text-anchor="middle" font-size="10" fill="#854d0e">payment</text>

  <!-- 4 Stars (green) -->
  <rect x="450" y="64" width="132" height="100" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="516" y="90" text-anchor="middle" font-size="12" fill="#fbbf24">★★★★</text>
  <text x="516" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Above average</text>
  <text x="516" y="132" text-anchor="middle" font-size="10" fill="#166534">Quality bonus</text>
  <text x="516" y="146" text-anchor="middle" font-size="10" fill="#166534">payment</text>

  <!-- 5 Stars (dark green) -->
  <rect x="594" y="64" width="148" height="100" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="668" y="90" text-anchor="middle" font-size="11" fill="#fbbf24">★★★★★</text>
  <text x="668" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Excellent</text>
  <text x="668" y="132" text-anchor="middle" font-size="10" fill="#166534">Max bonus +</text>
  <text x="668" y="146" text-anchor="middle" font-size="10" fill="#166534">open enroll</text>

  <text x="380" y="185" text-anchor="middle" font-size="10" fill="#9ca3af">Plans rated 4+ stars receive a quality bonus payment (~5% additional revenue from CMS). Most members choose 4+ star plans.</text>
</svg>
