<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How an ACO Works</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arr-dashed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="680" height="460" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="340" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#111">How an ACO Works</text>

  <!-- CMS (blue) -->
  <rect x="160" y="60" width="300" height="72" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="310" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">CMS</text>
  <text x="310" y="110" text-anchor="middle" font-size="11" fill="#1e40af">sets benchmark · holds contract</text>
  <text x="490" y="100" text-anchor="start" font-size="10" fill="#9ca3af">assigns attributed patients</text>

  <!-- Arrow CMS → ACO -->
  <line x1="310" y1="132" x2="310" y2="166" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ACO (blue, wider) -->
  <rect x="80" y="168" width="460" height="80" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="310" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">ACO</text>
  <text x="310" y="214" text-anchor="middle" font-size="11" fill="#1e40af">accountable for quality + total cost of care</text>
  <text x="310" y="230" text-anchor="middle" font-size="11" fill="#1e40af">manages network · tracks performance · shares savings</text>

  <!-- Arrows ACO → 3 boxes -->
  <line x1="185" y1="248" x2="120" y2="300" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="310" y1="248" x2="310" y2="300" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="435" y1="248" x2="500" y2="300" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Primary Care (green) -->
  <rect x="30" y="302" width="178" height="68" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="119" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Primary Care</text>
  <text x="119" y="350" text-anchor="middle" font-size="11" fill="#166534">first contact</text>

  <!-- Specialists (green) -->
  <rect x="221" y="302" width="178" height="68" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="310" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Specialists</text>
  <text x="310" y="350" text-anchor="middle" font-size="11" fill="#166534">referred care</text>

  <!-- Hospitals (green) -->
  <rect x="412" y="302" width="178" height="68" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="501" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Hospitals</text>
  <text x="501" y="350" text-anchor="middle" font-size="11" fill="#166534">acute care</text>

  <!-- Arrows → Attributed Patients -->
  <line x1="119" y1="370" x2="240" y2="412" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="310" y1="370" x2="310" y2="412" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="501" y1="370" x2="380" y2="412" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Attributed Patients (peach) -->
  <rect x="120" y="414" width="380" height="30" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="310" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Attributed Patients</text>
  <text x="310" y="440" text-anchor="middle" font-size="10" fill="#991b1b">assigned based on care patterns, not enrollment</text>

  <!-- Dashed savings flow arrow on right -->
  <path d="M 600 380 Q 650 310 600 200" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arr-dashed)"/>
  <text x="645" y="295" text-anchor="middle" font-size="9" fill="#9ca3af" transform="rotate(90, 645, 295)">shared savings flow</text>
</svg>
