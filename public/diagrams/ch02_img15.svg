<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Medicare Alphabet — Two Pathways, Four Parts</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#14532d"/>
    </marker>
  </defs>
  <rect width="760" height="310" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111">The Medicare Alphabet — Two Pathways, Four Parts</text>
  <text x="380" y="44" text-anchor="middle" font-size="11" fill="#6b7280">All paths share the Part B premium ($202.90/mo) paid directly to the federal government</text>

  <!-- Start at 65 -->
  <rect x="300" y="54" width="160" height="34" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="380" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Turn 65</text>
  <text x="380" y="82" text-anchor="middle" font-size="9.5" fill="#d1d5db">Automatic Medicare eligibility</text>

  <!-- Arrow down to split -->
  <line x1="380" y1="88" x2="380" y2="104" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="380" y="100" text-anchor="middle" font-size="9" fill="#9ca3af"></text>

  <!-- Choice box -->
  <rect x="280" y="104" width="200" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Choose your pathway</text>

  <!-- Left path line -->
  <line x1="280" y1="118" x2="180" y2="118" stroke="#1e3a8a" stroke-width="1.5"/>
  <line x1="180" y1="118" x2="180" y2="148" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="228" y="112" text-anchor="middle" font-size="9.5" fill="#1e3a8a">Pathway 1</text>

  <!-- Right path line -->
  <line x1="480" y1="118" x2="580" y2="118" stroke="#14532d" stroke-width="1.5"/>
  <line x1="580" y1="118" x2="580" y2="148" stroke="#14532d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="532" y="112" text-anchor="middle" font-size="9.5" fill="#14532d">Pathway 2</text>

  <!-- PATHWAY 1: Original Medicare -->
  <rect x="30" y="148" width="300" height="30" rx="7" fill="#1e3a8a"/>
  <text x="180" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Original Medicare</text>

  <!-- Part A -->
  <rect x="30" y="186" width="140" height="68" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="100" y="204" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Part A</text>
  <text x="100" y="218" text-anchor="middle" font-size="9.5" fill="#374151">Hospital coverage</text>
  <text x="100" y="232" text-anchor="middle" font-size="9.5" fill="#374151">Inpatient stays</text>
  <text x="100" y="246" text-anchor="middle" font-size="9" fill="#6b7280">$0 if 10yr work history</text>

  <!-- Part B -->
  <rect x="190" y="186" width="140" height="68" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="260" y="204" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Part B</text>
  <text x="260" y="218" text-anchor="middle" font-size="9.5" fill="#374151">Medical coverage</text>
  <text x="260" y="232" text-anchor="middle" font-size="9.5" fill="#374151">Doctor visits, labs</text>
  <text x="260" y="246" text-anchor="middle" font-size="9" fill="#6b7280">$202.90/mo (required)</text>

  <!-- Plus Part D -->
  <rect x="30" y="262" width="140" height="44" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="100" y="280" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3730a3">+ Part D</text>
  <text x="100" y="296" text-anchor="middle" font-size="9.5" fill="#374151">Standalone drug plan</text>

  <!-- Optional Medigap -->
  <rect x="190" y="262" width="140" height="44" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="260" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">+ Medigap</text>
  <text x="260" y="296" text-anchor="middle" font-size="9.5" fill="#374151">Optional gap cover</text>

  <!-- PATHWAY 2: Medicare Advantage -->
  <rect x="430" y="148" width="300" height="30" rx="7" fill="#14532d"/>
  <text x="580" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Medicare Advantage (Part C)</text>

  <!-- Big bundled box -->
  <rect x="430" y="186" width="300" height="120" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="580" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">All-in-one private plan</text>
  <text x="580" y="225" text-anchor="middle" font-size="10" fill="#374151">Bundles Part A (hospital)</text>
  <text x="580" y="240" text-anchor="middle" font-size="10" fill="#374151">+ Part B (medical)</text>
  <text x="580" y="255" text-anchor="middle" font-size="10" fill="#374151">+ usually Part D (drugs)</text>
  <line x1="448" y1="264" x2="712" y2="264" stroke="#bbf7d0" stroke-width="1"/>
  <text x="580" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Often $0 extra premium</text>
  <text x="580" y="295" text-anchor="middle" font-size="9.5" fill="#374151">Local network · annual OOP cap</text>

  <!-- Bottom note -->
  <rect x="140" y="273" width="150" height="26" rx="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="215" y="289" text-anchor="middle" font-size="9.5" font-weight="600" fill="#78350f">$202.90 Part B always owed</text>
</svg>
