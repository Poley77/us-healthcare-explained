<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Two Ways Money Moves in Healthcare</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="760" height="320" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Two Ways Money Moves in Healthcare</text>

  <!-- FFS Column -->
  <rect x="20" y="42" width="340" height="172" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="190" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">Fee-for-Service</text>

  <!-- Payer box -->
  <rect x="100" y="70" width="180" height="40" rx="7" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="190" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">Payer</text>
  <text x="190" y="102" text-anchor="middle" font-size="10" fill="#92400e">CMS / employer / health plan</text>

  <text x="190" y="122" text-anchor="middle" font-size="9" fill="#9ca3af">claim submitted ↓</text>
  <line x1="190" y1="110" x2="190" y2="128" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Claims Adjudication -->
  <rect x="70" y="130" width="240" height="40" rx="7" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="190" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">Claims Adjudication</text>
  <text x="190" y="162" text-anchor="middle" font-size="10" fill="#92400e">CPT codes priced · coverage checked</text>

  <text x="190" y="183" text-anchor="middle" font-size="9" fill="#9ca3af">payment issued ↓</text>
  <line x1="190" y1="170" x2="190" y2="188" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Provider -->
  <rect x="100" y="190" width="180" height="38" rx="7" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="190" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">Provider</text>
  <text x="190" y="222" text-anchor="middle" font-size="10" fill="#92400e">paid per service delivered</text>

  <!-- FFS How it works -->
  <rect x="20" y="224" width="340" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="190" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#c2410c">How it works</text>
  <text x="190" y="258" text-anchor="middle" font-size="10" fill="#374151">Every service generates a claim</text>
  <text x="190" y="272" text-anchor="middle" font-size="10" fill="#374151">Payment in 14–30 days (typical)</text>
  <text x="190" y="286" text-anchor="middle" font-size="10" fill="#374151">No visit = no revenue</text>
  <text x="190" y="300" text-anchor="middle" font-size="10" fill="#374151">Payer holds all financial risk</text>

  <!-- Divider -->
  <line x1="380" y1="42" x2="380" y2="314" stroke="#e2e2dc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- VBC Column -->
  <rect x="400" y="42" width="340" height="172" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="570" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Value-Based / Capitated</text>

  <!-- CMS/Payer box -->
  <rect x="480" y="70" width="180" height="40" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="570" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">CMS / Payer</text>
  <text x="570" y="102" text-anchor="middle" font-size="10" fill="#166534">pays fixed PMPM · risk-adjusted</text>

  <text x="570" y="122" text-anchor="middle" font-size="9" fill="#9ca3af">monthly PMPM ↓</text>
  <line x1="570" y1="110" x2="570" y2="128" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ACO / Health Plan -->
  <rect x="450" y="130" width="240" height="40" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="570" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ACO / Health Plan</text>
  <text x="570" y="162" text-anchor="middle" font-size="10" fill="#166534">manages population · bears risk</text>

  <text x="570" y="183" text-anchor="middle" font-size="9" fill="#9ca3af">sub-capitation ↓</text>
  <line x1="570" y1="170" x2="570" y2="188" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Provider / IPA -->
  <rect x="480" y="190" width="180" height="38" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="570" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Provider / IPA</text>
  <text x="570" y="222" text-anchor="middle" font-size="10" fill="#166534">fixed payment per patient per month</text>

  <!-- VBC How it works -->
  <rect x="400" y="224" width="340" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="570" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">How it works</text>
  <text x="570" y="258" text-anchor="middle" font-size="10" fill="#374151">Monthly payment regardless of utilization</text>
  <text x="570" y="272" text-anchor="middle" font-size="10" fill="#374151">Shared savings paid 9–15 months later</text>
  <text x="570" y="286" text-anchor="middle" font-size="10" fill="#374151">Provider bears some / all financial risk</text>
  <text x="570" y="300" text-anchor="middle" font-size="10" fill="#374151">FFS claims may still run underneath</text>
</svg>
