<svg viewBox="0 0 520 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Triple Aim</title>
  <rect width="520" height="460" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="260" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#111">The Triple Aim</text>
  <text x="260" y="62" text-anchor="middle" font-size="11" fill="#6b7280">Introduced by the Institute for Healthcare Improvement, 2008</text>

  <!-- Triangle lines -->
  <line x1="260" y1="175" x2="105" y2="360" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="260" y1="175" x2="415" y2="360" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="105" y1="360" x2="415" y2="360" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Center text -->
  <text x="260" y="268" text-anchor="middle" font-size="12" fill="#9ca3af">achieve all three</text>
  <text x="260" y="286" text-anchor="middle" font-size="12" fill="#9ca3af">simultaneously</text>

  <!-- Top circle: Better Health (blue) -->
  <circle cx="260" cy="148" r="72" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Better</text>
  <text x="260" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Health</text>
  <text x="260" y="178" text-anchor="middle" font-size="12" fill="#1e40af">Quality ↑</text>

  <!-- Bottom-left circle: Lower Cost (green) -->
  <circle cx="105" cy="360" r="72" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="105" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Lower</text>
  <text x="105" y="370" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Cost</text>
  <text x="105" y="390" text-anchor="middle" font-size="12" fill="#166534">Spend ↓</text>

  <!-- Bottom-right circle: Better Experience (red-brown) -->
  <circle cx="415" cy="360" r="72" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="415" y="343" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Better</text>
  <text x="415" y="363" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Experience</text>
  <text x="415" y="383" text-anchor="middle" font-size="12" fill="#991b1b">Satisfaction ↑</text>
</svg>
