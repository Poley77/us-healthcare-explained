<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Traditional Medicare vs. Medicare Advantage</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="760" height="420" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Traditional Medicare vs. Medicare Advantage</text>

  <!-- Column headers -->
  <text x="190" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Traditional Medicare</text>
  <text x="570" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Medicare Advantage (Part C)</text>

  <!-- Dashed divider -->
  <line x1="380" y1="80" x2="380" y2="400" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT COLUMN -->
  <!-- Box 1: CMS -->
  <rect x="25" y="88" width="305" height="78" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="177" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">CMS (Federal Government)</text>
  <text x="177" y="138" text-anchor="middle" font-size="11" fill="#1e40af">funds, sets rules, pays claims directly</text>

  <line x1="177" y1="166" x2="177" y2="200" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Doctors -->
  <rect x="25" y="202" width="305" height="78" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="177" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Doctors &amp; Hospitals</text>
  <text x="177" y="252" text-anchor="middle" font-size="11" fill="#1e40af">paid per service (fee-for-service)</text>

  <line x1="177" y1="280" x2="177" y2="314" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Patient -->
  <rect x="25" y="316" width="305" height="78" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="177" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Patient</text>
  <text x="177" y="366" text-anchor="middle" font-size="11" fill="#6d28d9">can see any Medicare-accepting provider</text>

  <!-- RIGHT COLUMN -->
  <!-- Box 1: CMS -->
  <rect x="430" y="88" width="305" height="78" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="582" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">CMS (Federal Government)</text>
  <text x="582" y="138" text-anchor="middle" font-size="11" fill="#1e40af">pays fixed monthly amount per enrollee</text>

  <line x1="582" y1="166" x2="582" y2="200" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Private Health Plan -->
  <rect x="430" y="202" width="305" height="78" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="582" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Private Health Plan</text>
  <text x="582" y="252" text-anchor="middle" font-size="11" fill="#166534">manages care, holds financial risk</text>

  <line x1="582" y1="280" x2="582" y2="314" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Patient -->
  <rect x="430" y="316" width="305" height="78" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="582" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Patient</text>
  <text x="582" y="366" text-anchor="middle" font-size="11" fill="#6d28d9">enrolled in the plan's provider network</text>
</svg>
