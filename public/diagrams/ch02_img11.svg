<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>ACA Marketplace — Same Plan, Very Different Price</title>
  <rect width="760" height="310" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111">ACA Marketplace — Same Plan, Very Different Price</text>
  <text x="380" y="44" text-anchor="middle" font-size="11" fill="#6b7280">The government offers two separate subsidies; your income determines which apply</text>

  <!-- Column headers -->
  <text x="130" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Income</text>
  <text x="310" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Premium Tax Credit</text>
  <text x="500" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Cost-Sharing Reductions</text>
  <text x="670" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Silver Plan Cost</text>
  <line x1="20" y1="72" x2="740" y2="72" stroke="#e2e2dc" stroke-width="1"/>

  <!-- Row 1: Very low income -->
  <rect x="14" y="78" width="732" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="130" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">~$15,000 / yr</text>
  <text x="130" y="113" text-anchor="middle" font-size="9.5" fill="#374151">100–138% FPL</text>
  <text x="310" y="98" text-anchor="middle" font-size="10" fill="#374151">Very large — premium</text>
  <text x="310" y="113" text-anchor="middle" font-size="10" fill="#374151">near $0/month</text>
  <text x="500" y="98" text-anchor="middle" font-size="10" fill="#374151">Yes — deductible ~$500</text>
  <text x="500" y="113" text-anchor="middle" font-size="10" fill="#374151">copays ~$5–$15</text>
  <text x="670" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">~$0/mo</text>
  <text x="670" y="113" text-anchor="middle" font-size="9.5" fill="#14532d">near-Platinum benefits</text>

  <!-- Row 2: Moderate income -->
  <rect x="14" y="134" width="732" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">~$32,000 / yr</text>
  <text x="130" y="169" text-anchor="middle" font-size="9.5" fill="#374151">200–250% FPL</text>
  <text x="310" y="154" text-anchor="middle" font-size="10" fill="#374151">Moderate credit</text>
  <text x="310" y="169" text-anchor="middle" font-size="10" fill="#374151">still significant</text>
  <text x="500" y="154" text-anchor="middle" font-size="10" fill="#374151">Yes (below $39,900)</text>
  <text x="500" y="169" text-anchor="middle" font-size="10" fill="#374151">deductible reduced</text>
  <text x="670" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">~$80–120/mo</text>
  <text x="670" y="169" text-anchor="middle" font-size="9.5" fill="#1e3a8a">Gold-level benefits</text>

  <!-- Row 3: Higher moderate income -->
  <rect x="14" y="190" width="732" height="50" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="130" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">~$50,000 / yr</text>
  <text x="130" y="225" text-anchor="middle" font-size="9.5" fill="#374151">~310% FPL</text>
  <text x="310" y="210" text-anchor="middle" font-size="10" fill="#374151">Smaller credit —</text>
  <text x="310" y="225" text-anchor="middle" font-size="10" fill="#374151">some premium help</text>
  <text x="500" y="210" text-anchor="middle" font-size="10" fill="#374151">No — above $39,900</text>
  <text x="500" y="225" text-anchor="middle" font-size="10" fill="#374151">full deductible applies</text>
  <text x="670" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">~$250–350/mo</text>
  <text x="670" y="225" text-anchor="middle" font-size="9.5" fill="#78350f">standard Silver plan</text>

  <!-- Row 4: High income -->
  <rect x="14" y="246" width="732" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="130" y="266" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">$65,000+ / yr</text>
  <text x="130" y="281" text-anchor="middle" font-size="9.5" fill="#374151">Above 400% FPL</text>
  <text x="310" y="266" text-anchor="middle" font-size="10" fill="#374151">None — full premium</text>
  <text x="310" y="281" text-anchor="middle" font-size="10" fill="#374151">at full price</text>
  <text x="500" y="266" text-anchor="middle" font-size="10" fill="#374151">No</text>
  <text x="500" y="281" text-anchor="middle" font-size="10" fill="#374151">standard cost-sharing</text>
  <text x="670" y="266" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">$500–700+/mo</text>
  <text x="670" y="281" text-anchor="middle" font-size="9.5" fill="#7f1d1d">consider Bronze + HSA</text>

  <text x="380" y="303" text-anchor="middle" font-size="9.5" fill="#6b7280">FPL = Federal Poverty Level · $14,580 single adult 2026 · CSRs only on Silver-tier plans</text>
</svg>
