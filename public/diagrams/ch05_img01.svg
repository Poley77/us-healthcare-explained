<svg viewBox="0 0 720 370" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Fee-for-Service vs. Value-Based Care</title>
  <rect width="720" height="370" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111">Fee-for-Service vs. Value-Based Care</text>

  <!-- Header row -->
  <rect x="180" y="50" width="240" height="34" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="300" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Fee-for-Service</text>
  <rect x="430" y="50" width="270" height="34" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="565" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Value-Based Care</text>

  <!-- Row data: [label, ffs, vbc] -->
  <!-- Row 1 -->
  <rect x="10" y="88" width="700" height="28" rx="4" fill="#f1f5f9"/>
  <text x="18" y="107" font-size="11" fill="#6b7280">Payment unit</text>
  <text x="300" y="107" text-anchor="middle" font-size="11" fill="#374151">Each service / procedure</text>
  <text x="565" y="107" text-anchor="middle" font-size="11" fill="#374151">Population over time</text>

  <!-- Row 2 -->
  <text x="18" y="131" font-size="11" fill="#6b7280">Paid for</text>
  <text x="300" y="131" text-anchor="middle" font-size="11" fill="#374151">Volume of services delivered</text>
  <text x="565" y="131" text-anchor="middle" font-size="11" fill="#374151">Outcomes achieved</text>

  <!-- Row 3 -->
  <rect x="10" y="140" width="700" height="28" rx="4" fill="#f1f5f9"/>
  <text x="18" y="159" font-size="11" fill="#6b7280">Financial risk</text>
  <text x="300" y="159" text-anchor="middle" font-size="11" fill="#374151">Held by payer</text>
  <text x="565" y="159" text-anchor="middle" font-size="11" fill="#374151">Shared with provider</text>

  <!-- Row 4 -->
  <text x="18" y="183" font-size="11" fill="#6b7280">Core incentive</text>
  <text x="300" y="183" text-anchor="middle" font-size="11" fill="#374151">Do more</text>
  <text x="565" y="183" text-anchor="middle" font-size="11" fill="#374151">Do better</text>

  <!-- Row 5 -->
  <rect x="10" y="192" width="700" height="28" rx="4" fill="#f1f5f9"/>
  <text x="18" y="211" font-size="11" fill="#6b7280">Care focus</text>
  <text x="300" y="211" text-anchor="middle" font-size="11" fill="#374151">Treating illness</text>
  <text x="565" y="211" text-anchor="middle" font-size="11" fill="#374151">Preventing illness</text>

  <!-- Row 6 -->
  <text x="18" y="235" font-size="11" fill="#6b7280">Care coordination</text>
  <text x="300" y="235" text-anchor="middle" font-size="11" fill="#374151">Not rewarded</text>
  <text x="565" y="235" text-anchor="middle" font-size="11" fill="#374151">Central to the model</text>

  <!-- Row 7 -->
  <rect x="10" y="244" width="700" height="28" rx="4" fill="#f1f5f9"/>
  <text x="18" y="263" font-size="11" fill="#6b7280">Data dependency</text>
  <text x="300" y="263" text-anchor="middle" font-size="11" fill="#374151">Low — claim per visit</text>
  <text x="565" y="263" text-anchor="middle" font-size="11" fill="#374151">High — population analytics</text>

  <!-- Row 8 -->
  <text x="18" y="287" font-size="11" fill="#6b7280">Success measured by</text>
  <text x="300" y="287" text-anchor="middle" font-size="11" fill="#374151">Services billed</text>
  <text x="565" y="287" text-anchor="middle" font-size="11" fill="#374151">Quality + cost benchmarks</text>

  <!-- Row 9 -->
  <rect x="10" y="296" width="700" height="28" rx="4" fill="#f1f5f9"/>
  <text x="18" y="315" font-size="11" fill="#6b7280">Patient relationship</text>
  <text x="300" y="315" text-anchor="middle" font-size="11" fill="#374151">Episodic</text>
  <text x="565" y="315" text-anchor="middle" font-size="11" fill="#374151">Ongoing / longitudinal</text>

  <!-- Divider lines -->
  <line x1="170" y1="50" x2="170" y2="330" stroke="#e2e2dc" stroke-width="1"/>
  <line x1="420" y1="50" x2="420" y2="330" stroke="#e2e2dc" stroke-width="1"/>
  <rect x="10" y="84" width="700" height="250" rx="4" fill="none" stroke="#e2e2dc" stroke-width="1"/>
</svg>
