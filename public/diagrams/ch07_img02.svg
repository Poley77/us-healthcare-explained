<svg viewBox="0 0 760 240" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How ACO Savings Are Calculated</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="760" height="240" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#111">How ACO Savings Are Calculated</text>

  <!-- Box 1: Benchmark Set -->
  <rect x="18" y="58" width="158" height="80" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="97" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Benchmark Set</text>
  <text x="97" y="100" text-anchor="middle" font-size="10" fill="#1e40af">CMS calculates what</text>
  <text x="97" y="114" text-anchor="middle" font-size="10" fill="#1e40af">care "should" cost</text>

  <line x1="176" y1="98" x2="204" y2="98" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Year Runs -->
  <rect x="206" y="58" width="158" height="80" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="285" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Year Runs</text>
  <text x="285" y="100" text-anchor="middle" font-size="10" fill="#1e40af">ACO manages care,</text>
  <text x="285" y="114" text-anchor="middle" font-size="10" fill="#1e40af">costs accumulate</text>

  <line x1="364" y1="98" x2="392" y2="98" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Reconciliation -->
  <rect x="394" y="58" width="158" height="80" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="473" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Reconciliation</text>
  <text x="473" y="100" text-anchor="middle" font-size="10" fill="#1e40af">Actual spend vs.</text>
  <text x="473" y="114" text-anchor="middle" font-size="10" fill="#1e40af">benchmark compared</text>

  <line x1="552" y1="98" x2="580" y2="98" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: Outcome (green) -->
  <rect x="582" y="58" width="160" height="80" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="662" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Outcome</text>
  <text x="662" y="100" text-anchor="middle" font-size="11" fill="#166534">Under → bonus</text>
  <text x="662" y="116" text-anchor="middle" font-size="11" fill="#dc2626">Over → penalty †</text>

  <!-- Quality scores box -->
  <rect x="18" y="156" width="724" height="68" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Quality scores act as a gate</text>
  <text x="380" y="196" text-anchor="middle" font-size="10" fill="#6b7280">An ACO must meet minimum quality thresholds to receive any shared savings.</text>
  <text x="380" y="212" text-anchor="middle" font-size="10" fill="#6b7280">Cutting costs without maintaining quality earns nothing — or triggers penalties.</text>
</svg>
