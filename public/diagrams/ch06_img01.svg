<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Risk Spectrum</title>
  <rect width="820" height="340" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="410" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111">The Risk Spectrum</text>
  <text x="410" y="54" text-anchor="middle" font-size="11" fill="#6b7280">As providers take on more risk, they gain more potential reward — and more financial exposure</text>

  <!-- Low/High risk labels -->
  <text x="18" y="78" font-size="11" fill="#6b7280">Low risk</text>
  <text x="802" y="78" text-anchor="end" font-size="11" fill="#6b7280">High risk</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="riskGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="33%" stop-color="#34d399"/>
      <stop offset="66%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>
  <rect x="18" y="82" width="784" height="6" rx="3" fill="url(#riskGrad)"/>

  <!-- 4 section boxes -->
  <!-- Fee-for-Service (blue) -->
  <rect x="18" y="94" width="188" height="148" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="112" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Fee-for-Service</text>
  <text x="112" y="133" text-anchor="middle" font-size="10" fill="#3b82f6">Payer holds 100% of risk</text>
  <line x1="32" y1="140" x2="194" y2="140" stroke="#bfdbfe" stroke-width="1"/>
  <text x="112" y="156" text-anchor="middle" font-size="10" fill="#374151">Paid per service.</text>
  <text x="112" y="170" text-anchor="middle" font-size="10" fill="#374151">Provider takes no</text>
  <text x="112" y="184" text-anchor="middle" font-size="10" fill="#374151">financial risk.</text>
  <text x="112" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280">REWARD POTENTIAL</text>
  <text x="112" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Fee only</text>

  <!-- Shared Savings (green) -->
  <rect x="214" y="94" width="188" height="148" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="308" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Shared Savings</text>
  <text x="308" y="133" text-anchor="middle" font-size="10" fill="#16a34a">Payer + Upside ↑</text>
  <line x1="228" y1="140" x2="390" y2="140" stroke="#bbf7d0" stroke-width="1"/>
  <text x="308" y="156" text-anchor="middle" font-size="10" fill="#374151">Bonus if costs come</text>
  <text x="308" y="170" text-anchor="middle" font-size="10" fill="#374151">in below target.</text>
  <text x="308" y="184" text-anchor="middle" font-size="10" fill="#374151">No penalty if over.</text>
  <text x="308" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280">REWARD POTENTIAL</text>
  <text x="308" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Bonus if under</text>

  <!-- Shared Risk (amber) -->
  <rect x="410" y="94" width="188" height="148" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="504" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Shared Risk</text>
  <text x="504" y="133" text-anchor="middle" font-size="10" fill="#d97706">Payer + Provider</text>
  <line x1="424" y1="140" x2="586" y2="140" stroke="#fde68a" stroke-width="1"/>
  <text x="504" y="156" text-anchor="middle" font-size="10" fill="#374151">Bonus if under target.</text>
  <text x="504" y="170" text-anchor="middle" font-size="10" fill="#374151">Owes money back</text>
  <text x="504" y="184" text-anchor="middle" font-size="10" fill="#374151">if costs run over.</text>
  <text x="504" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280">REWARD POTENTIAL</text>
  <text x="504" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">Bonus / Penalty</text>

  <!-- Full Capitation (red) -->
  <rect x="606" y="94" width="196" height="148" rx="8" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="704" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Full Capitation</text>
  <text x="704" y="133" text-anchor="middle" font-size="10" fill="#dc2626">Pay + Provider</text>
  <line x1="620" y1="140" x2="788" y2="140" stroke="#fecdd3" stroke-width="1"/>
  <text x="704" y="156" text-anchor="middle" font-size="10" fill="#374151">Fixed monthly</text>
  <text x="704" y="170" text-anchor="middle" font-size="10" fill="#374151">payment (PMPM).</text>
  <text x="704" y="184" text-anchor="middle" font-size="10" fill="#374151">Full budget responsibility.</text>
  <text x="704" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280">REWARD POTENTIAL</text>
  <text x="704" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Max upside</text>

  <!-- Bottom summary box -->
  <rect x="18" y="252" width="784" height="72" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Risk and reward are the same lever</text>
  <text x="410" y="293" text-anchor="middle" font-size="11" fill="#6b7280">More risk → more upside if care is managed well.</text>
  <text x="410" y="309" text-anchor="middle" font-size="11" fill="#6b7280">More risk → more exposure if it isn't.</text>
</svg>
