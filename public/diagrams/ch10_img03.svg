<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How ACO, IPA, and MSO Work Together</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="700" height="380" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="350" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111">How ACO, IPA, and MSO Work Together</text>
  <text x="350" y="56" text-anchor="middle" font-size="11" fill="#6b7280">A common real-world structure in Medicare Advantage and MSSP</text>

  <!-- CMS / Health Plan (blue top) -->
  <rect x="120" y="70" width="460" height="58" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="350" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">CMS / Health Plan</text>
  <text x="350" y="116" text-anchor="middle" font-size="11" fill="#1e40af">pays benchmark · sets quality standards</text>

  <line x1="350" y1="128" x2="350" y2="152" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ACO layer -->
  <rect x="30" y="154" width="640" height="58" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="230" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">ACO</text>
  <text x="230" y="198" text-anchor="middle" font-size="11" fill="#1e40af">holds contract · accountable for outcomes</text>
  <text x="560" y="177" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">Accountability layer</text>
  <text x="560" y="195" text-anchor="middle" font-size="11" fill="#6b7280">bears performance risk</text>

  <line x1="350" y1="212" x2="350" y2="236" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IPA layer -->
  <rect x="30" y="238" width="640" height="58" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="230" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">IPA</text>
  <text x="230" y="282" text-anchor="middle" font-size="11" fill="#166534">organizes physicians · sub-contracts within ACO</text>
  <text x="560" y="261" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">Network layer</text>
  <text x="560" y="279" text-anchor="middle" font-size="11" fill="#6b7280">aggregates physicians</text>

  <line x1="350" y1="296" x2="350" y2="320" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MSO layer -->
  <rect x="30" y="322" width="640" height="42" rx="10" fill="#fef9ec" stroke="#fde68a" stroke-width="1.5"/>
  <text x="230" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">MSO</text>
  <text x="230" y="356" text-anchor="middle" font-size="11" fill="#92400e">data · billing · care management · technology</text>
  <text x="560" y="338" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">Infrastructure layer</text>
  <text x="560" y="356" text-anchor="middle" font-size="11" fill="#6b7280">enables performance</text>
</svg>
