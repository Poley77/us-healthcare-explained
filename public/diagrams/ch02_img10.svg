<svg viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Under 65, No Employer — Income Determines Your Path</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="740" height="300" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="370" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111">Under 65, No Employer Coverage</text>
  <text x="370" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Your annual household income determines which programme you enter</text>

  <!-- Start box -->
  <rect x="270" y="54" width="200" height="38" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1.5"/>
  <text x="370" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">No employer insurance</text>
  <text x="370" y="84" text-anchor="middle" font-size="10" fill="#d1d5db">self-employed, between jobs, or not offered</text>

  <line x1="370" y1="92" x2="370" y2="112" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="370,114 480,145 370,176 260,145" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="370" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Annual income?</text>
  <text x="370" y="155" text-anchor="middle" font-size="9.5" fill="#6b7280">(single adult, 2026)</text>

  <!-- Left arrow: below 138% FPL -->
  <line x1="260" y1="145" x2="140" y2="145" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="198" y="138" text-anchor="middle" font-size="9" fill="#16a34a">Below $22,025</text>
  <text x="198" y="150" text-anchor="middle" font-size="9" fill="#16a34a">(138% FPL)</text>

  <!-- Right arrow: above 138% FPL -->
  <line x1="480" y1="145" x2="600" y2="145" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="542" y="138" text-anchor="middle" font-size="9" fill="#2563eb">Above $22,025</text>
  <text x="542" y="150" text-anchor="middle" font-size="9" fill="#2563eb">(138% FPL)</text>

  <!-- Medicaid box -->
  <rect x="20" y="172" width="220" height="80" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="130" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Medicaid</text>
  <text x="130" y="208" text-anchor="middle" font-size="9.5" fill="#374151">Free or near-free</text>
  <text x="130" y="222" text-anchor="middle" font-size="9.5" fill="#374151">Minimal copays</text>
  <text x="130" y="236" text-anchor="middle" font-size="9.5" fill="#374151">Available in 41 expansion states</text>

  <!-- ACA Marketplace box -->
  <rect x="500" y="172" width="220" height="80" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="610" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">ACA Marketplace</text>
  <text x="610" y="208" text-anchor="middle" font-size="9.5" fill="#374151">Subsidised premiums</text>
  <text x="610" y="222" text-anchor="middle" font-size="9.5" fill="#374151">Income-scaled subsidies</text>
  <text x="610" y="236" text-anchor="middle" font-size="9.5" fill="#374151">Healthcare.gov routes you</text>

  <!-- Warning: coverage gap -->
  <rect x="140" y="262" width="460" height="30" rx="7" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="370" y="278" text-anchor="middle" font-size="9.5" fill="#7f1d1d">⚠ 10 states have NOT expanded Medicaid — low-income adults may fall into a coverage gap</text>
</svg>
