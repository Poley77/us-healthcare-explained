<svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Who Bears the Risk? — Four Models Compared</title>
  <rect width="820" height="260" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Who Bears the Risk? — Four Models Compared</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#6b7280">From enabling platforms to fully integrated insurers</text>

  <!-- Risk spectrum bar -->
  <rect x="40" y="56" width="740" height="18" rx="9" fill="url(#riskgrad)"/>
  <defs>
    <linearGradient id="riskgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
  </defs>
  <text x="40" y="92" text-anchor="start" font-size="9.5" fill="#166534">← Low provider risk</text>
  <text x="780" y="92" text-anchor="end" font-size="9.5" fill="#991b1b">High provider risk →</text>

  <!-- Aledade -->
  <rect x="14" y="100" width="186" height="130" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="107" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Aledade</text>
  <line x1="24" y1="128" x2="190" y2="128" stroke="#bfdbfe" stroke-width="1"/>
  <text x="107" y="144" text-anchor="middle" font-size="9.5" fill="#374151">MSO + ACO enabler</text>
  <text x="107" y="158" text-anchor="middle" font-size="9.5" fill="#374151">Shared savings only</text>
  <text x="107" y="172" text-anchor="middle" font-size="9.5" fill="#374151">Physician retains practice</text>
  <text x="107" y="186" text-anchor="middle" font-size="9.5" fill="#374151">FFS revenue baseline</text>
  <rect x="24" y="218" width="166" height="8" rx="4" fill="#dcfce7"/>
  <text x="107" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Platform model</text>

  <!-- Privia Health -->
  <rect x="210" y="100" width="186" height="130" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="303" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Privia Health</text>
  <line x1="220" y1="128" x2="386" y2="128" stroke="#fde68a" stroke-width="1"/>
  <text x="303" y="144" text-anchor="middle" font-size="9.5" fill="#374151">MSO + physician group</text>
  <text x="303" y="158" text-anchor="middle" font-size="9.5" fill="#374151">FFS + VBC contracts</text>
  <text x="303" y="172" text-anchor="middle" font-size="9.5" fill="#374151">Multi-payer upside</text>
  <text x="303" y="186" text-anchor="middle" font-size="9.5" fill="#374151">Modest downside</text>
  <rect x="220" y="218" width="166" height="8" rx="4" fill="#fef3c7"/>
  <text x="303" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#78350f">Group model</text>

  <!-- agilon health -->
  <rect x="406" y="100" width="186" height="130" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="499" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">agilon health</text>
  <line x1="416" y1="128" x2="582" y2="128" stroke="#fca5a5" stroke-width="1"/>
  <text x="499" y="144" text-anchor="middle" font-size="9.5" fill="#374151">Global capitation</text>
  <text x="499" y="158" text-anchor="middle" font-size="9.5" fill="#374151">agilon holds full risk</text>
  <text x="499" y="172" text-anchor="middle" font-size="9.5" fill="#374151">Physician JV earns</text>
  <text x="499" y="186" text-anchor="middle" font-size="9.5" fill="#374151">share of surplus</text>
  <rect x="416" y="218" width="166" height="8" rx="4" fill="#fef2f2"/>
  <text x="499" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#7f1d1d">Risk-bearing model</text>

  <!-- Alignment Health -->
  <rect x="602" y="100" width="204" height="130" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="704" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Alignment Health</text>
  <line x1="612" y1="128" x2="796" y2="128" stroke="#ddd6fe" stroke-width="1"/>
  <text x="704" y="144" text-anchor="middle" font-size="9.5" fill="#374151">MA plan + delivery</text>
  <text x="704" y="158" text-anchor="middle" font-size="9.5" fill="#374151">Full insurance risk</text>
  <text x="704" y="172" text-anchor="middle" font-size="9.5" fill="#374151">Both insures and</text>
  <text x="704" y="186" text-anchor="middle" font-size="9.5" fill="#374151">delivers care</text>
  <rect x="612" y="218" width="184" height="8" rx="4" fill="#ede9fe"/>
  <text x="704" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#4c1d95">Payvider model</text>

  <!-- Footer -->
  <text x="410" y="248" text-anchor="middle" font-size="9.5" fill="#6b7280">All four generate VBC revenue — but who absorbs losses and who earns surplus differs fundamentally across models</text>
</svg>
