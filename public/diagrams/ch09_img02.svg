<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Corporate Practice of Medicine — and How MSOs Navigate It</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="720" height="260" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="360" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Corporate Practice of Medicine — and How MSOs Navigate It</text>

  <!-- The Rule (red) -->
  <rect x="18" y="54" width="300" height="148" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="168" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">The Rule (CPOM)</text>
  <text x="168" y="104" text-anchor="middle" font-size="11" fill="#374151">In most US states, corporations</text>
  <text x="168" y="120" text-anchor="middle" font-size="11" fill="#374151">cannot own medical practices or</text>
  <text x="168" y="136" text-anchor="middle" font-size="11" fill="#374151">directly employ physicians.</text>
  <text x="168" y="158" text-anchor="middle" font-size="11" fill="#374151">Only licensed physicians can</text>
  <text x="168" y="174" text-anchor="middle" font-size="11" fill="#374151">own a medical practice.</text>

  <!-- "solved by" arrow -->
  <line x1="318" y1="128" x2="370" y2="128" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="344" y="120" text-anchor="middle" font-size="10" fill="#9ca3af">solved by</text>

  <!-- The MSO Structure (green) -->
  <rect x="402" y="54" width="300" height="148" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="552" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">The MSO Structure</text>
  <text x="552" y="104" text-anchor="middle" font-size="11" fill="#374151">Physician-owned PC holds the</text>
  <text x="552" y="120" text-anchor="middle" font-size="11" fill="#374151">medical license and employs</text>
  <text x="552" y="136" text-anchor="middle" font-size="11" fill="#374151">the physicians.</text>
  <text x="552" y="158" text-anchor="middle" font-size="11" fill="#374151">MSO provides all non-clinical</text>
  <text x="552" y="174" text-anchor="middle" font-size="11" fill="#374151">services under a management fee.</text>

  <!-- Footer -->
  <text x="360" y="222" text-anchor="middle" font-size="10" fill="#9ca3af">PC = Professional Corporation (physician-owned entity that holds the medical license)</text>
  <text x="360" y="240" text-anchor="middle" font-size="10" fill="#9ca3af">MSO = the business entity that can be investor-owned or corporate-backed</text>
</svg>
