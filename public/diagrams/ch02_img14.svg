<svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Three Safety Nets — Medigap, Medicare Advantage, Medicaid</title>
  <rect width="760" height="290" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#111">The Three Safety Nets</text>
  <text x="380" y="44" text-anchor="middle" font-size="11" fill="#6b7280">~90% of Medicare beneficiaries add one of these three protections on top of Original Medicare</text>

  <!-- Medigap -->
  <rect x="14" y="54" width="232" height="214" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="14" y="54" width="232" height="34" rx="10" fill="#1e3a8a"/>
  <rect x="14" y="74" width="232" height="14" fill="#1e3a8a"/>
  <text x="130" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Medigap</text>
  <text x="130" y="90" text-anchor="middle" font-size="9" fill="#bfdbfe">Supplemental policy</text>
  <text x="130" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">What it does</text>
  <text x="130" y="126" text-anchor="middle" font-size="9.5" fill="#374151">Pays the 20% Part B</text>
  <text x="130" y="140" text-anchor="middle" font-size="9.5" fill="#374151">coinsurance for you</text>
  <text x="130" y="154" text-anchor="middle" font-size="9.5" fill="#374151">Covers most deductibles</text>
  <line x1="26" y1="163" x2="234" y2="163" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">Extra cost</text>
  <text x="130" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#111">$150–$300+/mo</text>
  <line x1="26" y1="204" x2="234" y2="204" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">Key advantage</text>
  <text x="130" y="234" text-anchor="middle" font-size="9.5" fill="#374151">See any doctor in the US</text>
  <text x="130" y="248" text-anchor="middle" font-size="9.5" fill="#374151">who accepts Medicare</text>
  <text x="130" y="262" text-anchor="middle" font-size="9" fill="#6b7280">No network restriction</text>

  <!-- Medicare Advantage -->
  <rect x="258" y="54" width="244" height="214" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="258" y="54" width="244" height="34" rx="10" fill="#14532d"/>
  <rect x="258" y="74" width="244" height="14" fill="#14532d"/>
  <text x="380" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Medicare Advantage</text>
  <text x="380" y="90" text-anchor="middle" font-size="9" fill="#bbf7d0">Part C — replaces Original Medicare</text>
  <text x="380" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">What it does</text>
  <text x="380" y="126" text-anchor="middle" font-size="9.5" fill="#374151">Private insurer manages</text>
  <text x="380" y="140" text-anchor="middle" font-size="9.5" fill="#374151">all your Medicare benefits</text>
  <text x="380" y="154" text-anchor="middle" font-size="9.5" fill="#374151">Usually includes Part D (drugs)</text>
  <line x1="270" y1="163" x2="490" y2="163" stroke="#bbf7d0" stroke-width="1"/>
  <text x="380" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Extra cost</text>
  <text x="380" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#111">Often $0 extra/mo</text>
  <text x="380" y="207" text-anchor="middle" font-size="9" fill="#6b7280">(you still pay Part B to govt)</text>
  <line x1="270" y1="216" x2="490" y2="216" stroke="#bbf7d0" stroke-width="1"/>
  <text x="380" y="231" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Key protection</text>
  <text x="380" y="246" text-anchor="middle" font-size="9.5" fill="#374151">Annual OOP cap ~$9,250</text>
  <text x="380" y="260" text-anchor="middle" font-size="9" fill="#6b7280">Local network required</text>

  <!-- Dual eligibility -->
  <rect x="514" y="54" width="232" height="214" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <rect x="514" y="54" width="232" height="34" rx="10" fill="#78350f"/>
  <rect x="514" y="74" width="232" height="14" fill="#78350f"/>
  <text x="630" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Dual Eligibility</text>
  <text x="630" y="90" text-anchor="middle" font-size="9" fill="#fde68a">Medicare + Medicaid</text>
  <text x="630" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Who qualifies</text>
  <text x="630" y="126" text-anchor="middle" font-size="9.5" fill="#374151">Low-income seniors</text>
  <text x="630" y="140" text-anchor="middle" font-size="9.5" fill="#374151">enrolled in both programmes</text>
  <text x="630" y="154" text-anchor="middle" font-size="9.5" fill="#374151">simultaneously</text>
  <line x1="526" y1="163" x2="734" y2="163" stroke="#fde68a" stroke-width="1"/>
  <text x="630" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">Extra cost</text>
  <text x="630" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#111">Effectively $0</text>
  <line x1="526" y1="204" x2="734" y2="204" stroke="#fde68a" stroke-width="1"/>
  <text x="630" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">What Medicaid covers</text>
  <text x="630" y="234" text-anchor="middle" font-size="9.5" fill="#374151">Pays Medicare deductibles,</text>
  <text x="630" y="248" text-anchor="middle" font-size="9.5" fill="#374151">copays, and premiums</text>
  <text x="630" y="262" text-anchor="middle" font-size="9" fill="#6b7280">~1 in 5 Medicare beneficiaries</text>

  <text x="380" y="282" text-anchor="middle" font-size="9" fill="#6b7280">Almost no one relies on Original Medicare alone — the uncapped 20% coinsurance is too large a risk</text>
</svg>
