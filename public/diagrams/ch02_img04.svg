<svg viewBox="0 0 760 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Key Players: Chapter 2</title>
  <rect width="760" height="210" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Key Players: Chapter 2</text>

  <!-- CMS (blue) -->
  <rect x="18" y="58" width="170" height="110" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="103" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">CMS</text>
  <text x="103" y="105" text-anchor="middle" font-size="11" fill="#1e40af">Federal regulator</text>
  <text x="103" y="121" text-anchor="middle" font-size="11" fill="#1e40af">and payer</text>
  <text x="103" y="140" text-anchor="middle" font-size="11" fill="#1e40af">Medicare &amp; Medicaid</text>

  <!-- UnitedHealthcare (green) -->
  <rect x="202" y="58" width="170" height="110" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="287" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">UnitedHealthcare</text>
  <text x="287" y="102" text-anchor="middle" font-size="11" fill="#166534">Largest US insurer</text>
  <text x="287" y="118" text-anchor="middle" font-size="11" fill="#166534">+ Optum (data)</text>
  <text x="287" y="138" text-anchor="middle" font-size="11" fill="#166534">Commercial, MA, Medicaid</text>

  <!-- Humana (amber) -->
  <rect x="386" y="58" width="170" height="110" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="471" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Humana</text>
  <text x="471" y="105" text-anchor="middle" font-size="11" fill="#92400e">Medicare Advantage</text>
  <text x="471" y="121" text-anchor="middle" font-size="11" fill="#92400e">specialist</text>
  <text x="471" y="140" text-anchor="middle" font-size="11" fill="#92400e">Senior population focus</text>

  <!-- CVS Health (purple) -->
  <rect x="570" y="58" width="172" height="110" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="656" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">CVS Health</text>
  <text x="656" y="105" text-anchor="middle" font-size="11" fill="#6d28d9">Pharmacy + Aetna</text>
  <text x="656" y="121" text-anchor="middle" font-size="11" fill="#6d28d9">(insurance) + clinics</text>
  <text x="656" y="140" text-anchor="middle" font-size="11" fill="#6d28d9">Vertically integrated</text>

  <!-- Caption -->
  <text x="380" y="192" text-anchor="middle" font-size="11" fill="#9ca3af">All private plans operate within rules set by CMS</text>
</svg>
