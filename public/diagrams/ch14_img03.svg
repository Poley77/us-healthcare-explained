<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How Medicare Advantage Is Funded</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>
  <rect width="700" height="400" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="350" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#111">How Medicare Advantage Is Funded</text>
  <text x="350" y="52" text-anchor="middle" font-size="11" fill="#6b7280">CMS pays a risk-adjusted monthly amount per enrolled member</text>

  <!-- CMS (dark blue) -->
  <rect x="185" y="64" width="330" height="56" rx="10" fill="#1e3a8a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="350" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CMS</text>
  <text x="350" y="108" text-anchor="middle" font-size="11" fill="#bfdbfe">sets benchmark · calculates risk score</text>
  <text x="530" y="86" text-anchor="start" font-size="10" fill="#9ca3af">PMPM × RAF score = monthly payment</text>

  <line x1="350" y1="120" x2="350" y2="152" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MA Plan (blue) -->
  <rect x="100" y="154" width="500" height="72" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="350" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">MA Plan</text>
  <text x="350" y="196" text-anchor="middle" font-size="11" fill="#1e40af">collects capitation · manages care · takes financial risk</text>
  <text x="350" y="214" text-anchor="middle" font-size="11" fill="#1e40af">must also meet Stars quality thresholds</text>

  <!-- Arrows MA Plan → 3 boxes -->
  <line x1="210" y1="226" x2="130" y2="272" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="350" y1="226" x2="350" y2="272" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="490" y1="226" x2="570" y2="272" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Primary Care (green) -->
  <rect x="30" y="274" width="190" height="58" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="125" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Primary Care</text>
  <text x="125" y="318" text-anchor="middle" font-size="10" fill="#166534">often capitated or VBC</text>

  <!-- Specialists (green) -->
  <rect x="255" y="274" width="190" height="58" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="350" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Specialists</text>
  <text x="350" y="318" text-anchor="middle" font-size="10" fill="#166534">fee-for-service or bundled</text>

  <!-- Hospitals (green) -->
  <rect x="480" y="274" width="190" height="58" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="575" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Hospitals</text>
  <text x="575" y="318" text-anchor="middle" font-size="10" fill="#166534">managed utilization</text>

  <!-- Bottom summary box -->
  <rect x="30" y="346" width="640" height="40" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="350" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">The MA plan keeps the difference — or absorbs the loss</text>
  <text x="350" y="378" text-anchor="middle" font-size="10" fill="#6d28d9">If actual care costs &lt; CMS payment → plan profits     If actual care costs &gt; CMS payment → plan loses money</text>
</svg>
