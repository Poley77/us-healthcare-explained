<svg viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>The Contract Chain</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="780" height="500" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="390" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#111">The Contract Chain</text>
  <text x="390" y="52" text-anchor="middle" font-size="11" fill="#6b7280">Every layer contracts with the one above — risk flows down, money flows up</text>

  <!-- CMS / Employer / State -->
  <rect x="80" y="64" width="440" height="58" rx="10" fill="#1e3a8a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="300" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CMS / Employer / State</text>
  <text x="300" y="109" text-anchor="middle" font-size="11" fill="#bfdbfe">funds the program · sets the rules</text>
  <text x="535" y="82" text-anchor="start" font-size="10" fill="#9ca3af">Contract type:</text>
  <text x="535" y="96" text-anchor="start" font-size="10" fill="#9ca3af">Regulatory / statutory</text>

  <text x="40" y="100" text-anchor="middle" font-size="10" fill="#60a5fa">money ↑</text>
  <text x="40" y="115" text-anchor="middle" font-size="10" fill="#f87171">risk ↓</text>
  <line x1="300" y1="122" x2="300" y2="150" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Health Plan / MA Plan -->
  <rect x="80" y="152" width="440" height="64" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="300" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Health Plan / MA Plan</text>
  <text x="300" y="196" text-anchor="middle" font-size="11" fill="#1e40af">accepts capitation · manages network · holds quality accountability</text>
  <text x="535" y="168" text-anchor="start" font-size="10" fill="#9ca3af">Contract type:</text>
  <text x="535" y="182" text-anchor="start" font-size="10" fill="#9ca3af">MA Plan contract (CMS)</text>
  <text x="535" y="196" text-anchor="start" font-size="10" fill="#9ca3af">or ASO / employer contract</text>

  <text x="40" y="192" text-anchor="middle" font-size="10" fill="#60a5fa">money ↑</text>
  <text x="40" y="207" text-anchor="middle" font-size="10" fill="#f87171">risk ↓</text>
  <line x1="300" y1="216" x2="300" y2="244" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ACO -->
  <rect x="80" y="246" width="440" height="58" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="300" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">ACO</text>
  <text x="300" y="290" text-anchor="middle" font-size="11" fill="#166534">accountable for total cost of care · quality thresholds · shared savings</text>
  <text x="535" y="258" text-anchor="start" font-size="10" fill="#9ca3af">Contract type:</text>
  <text x="535" y="272" text-anchor="start" font-size="10" fill="#9ca3af">MSSP / ACO REACH /</text>
  <text x="535" y="286" text-anchor="start" font-size="10" fill="#9ca3af">MA value-based contract</text>

  <text x="40" y="280" text-anchor="middle" font-size="10" fill="#60a5fa">money ↑</text>
  <text x="40" y="295" text-anchor="middle" font-size="10" fill="#f87171">risk ↓</text>
  <line x1="300" y1="304" x2="300" y2="332" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- IPA -->
  <rect x="80" y="334" width="440" height="56" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="300" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">IPA</text>
  <text x="300" y="378" text-anchor="middle" font-size="11" fill="#166534">organizes physicians · sub-capitation or shared savings pass-through</text>
  <text x="535" y="348" text-anchor="start" font-size="10" fill="#9ca3af">Contract type:</text>
  <text x="535" y="362" text-anchor="start" font-size="10" fill="#9ca3af">Participation agreement</text>
  <text x="535" y="376" text-anchor="start" font-size="10" fill="#9ca3af">Sub-capitation contract</text>

  <text x="40" y="368" text-anchor="middle" font-size="10" fill="#60a5fa">money ↑</text>
  <text x="40" y="383" text-anchor="middle" font-size="10" fill="#f87171">risk ↓</text>
  <line x1="300" y1="390" x2="300" y2="414" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Physician Practice -->
  <rect x="80" y="416" width="440" height="56" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="300" y="440" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">Physician Practice</text>
  <text x="300" y="460" text-anchor="middle" font-size="11" fill="#92400e">delivers care · documents diagnoses · drives quality measures</text>
  <text x="535" y="430" text-anchor="start" font-size="10" fill="#9ca3af">Contract type:</text>
  <text x="535" y="444" text-anchor="start" font-size="10" fill="#9ca3af">Provider participation agmt</text>
  <text x="535" y="458" text-anchor="start" font-size="10" fill="#9ca3af">MSA (with MSO)</text>

  <!-- Patient -->
  <rect x="170" y="480" width="260" height="14" rx="6" fill="#f1f5f9"/>
  <text x="300" y="491" text-anchor="middle" font-size="10" fill="#9ca3af">Patient — no contract, just care</text>
</svg>
