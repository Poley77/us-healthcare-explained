<svg viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>How a Fee-for-Service Claim Works</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="520" height="520" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="260" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="#111">How a Fee-for-Service Claim Works</text>

  <!-- 1. Patient Visit (amber) -->
  <rect x="80" y="62" width="280" height="68" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="220" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">1. Patient Visit</text>
  <text x="220" y="113" text-anchor="middle" font-size="11" fill="#92400e">Doctor sees the patient</text>

  <line x1="220" y1="130" x2="220" y2="158" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Coding (blue) -->
  <rect x="80" y="160" width="280" height="68" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="220" y="189" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">2. Coding</text>
  <text x="220" y="211" text-anchor="middle" font-size="11" fill="#1e40af">CPT + ICD-10 codes assigned</text>
  <text x="390" y="198" text-anchor="start" font-size="11" fill="#9ca3af">what was done</text>

  <line x1="220" y1="228" x2="220" y2="256" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Claim Submitted (blue) -->
  <rect x="80" y="258" width="280" height="68" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="220" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">3. Claim Submitted</text>
  <text x="220" y="309" text-anchor="middle" font-size="11" fill="#1e40af">sent to the payer (health plan)</text>
  <text x="390" y="296" text-anchor="start" font-size="11" fill="#9ca3af">what it cost</text>

  <line x1="220" y1="326" x2="220" y2="354" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Adjudication (blue) -->
  <rect x="80" y="356" width="280" height="68" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="220" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">4. Adjudication</text>
  <text x="220" y="407" text-anchor="middle" font-size="11" fill="#1e40af">payer reviews, approves, prices</text>
  <text x="390" y="394" text-anchor="start" font-size="11" fill="#9ca3af">what's covered</text>

  <line x1="220" y1="424" x2="220" y2="452" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. Payment (green) -->
  <rect x="80" y="454" width="280" height="48" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="220" y="475" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">5. Payment</text>
  <text x="220" y="493" text-anchor="middle" font-size="11" fill="#166534">provider paid per service</text>
</svg>
