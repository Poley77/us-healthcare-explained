<svg viewBox="0 0 760 310" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Aledade — How It Works</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="760" height="310" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Aledade — How It Works</text>
  <text x="380" y="46" text-anchor="middle" font-size="11" fill="#6b7280">ACO management platform for independent primary care physicians</text>

  <!-- CMS / MA Plans -->
  <rect x="240" y="56" width="280" height="48" rx="9" fill="#1e3a8a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="380" y="77" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CMS / MA Plans</text>
  <text x="380" y="95" text-anchor="middle" font-size="10" fill="#bfdbfe">MSSP ACO contract · risk-adjusted PMPM</text>

  <line x1="380" y1="104" x2="380" y2="124" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Aledade outer box -->
  <rect x="60" y="126" width="640" height="100" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="380" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Aledade</text>
  <text x="380" y="161" text-anchor="middle" font-size="10" fill="#374151">Operates the ACO · provides full MSO platform · retains no physician ownership</text>

  <!-- Three function badges -->
  <rect x="104" y="168" width="130" height="42" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="169" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ACO Function</text>
  <text x="169" y="202" text-anchor="middle" font-size="9.5" fill="#166534">MSSP / ACO REACH</text>

  <rect x="315" y="168" width="130" height="42" rx="7" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="380" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">MSO Function</text>
  <text x="380" y="202" text-anchor="middle" font-size="9.5" fill="#92400e">ops · analytics · contracting</text>

  <rect x="526" y="168" width="140" height="42" rx="7" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="596" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Tech Platform</text>
  <text x="596" y="202" text-anchor="middle" font-size="9.5" fill="#6d28d9">proprietary analytics</text>

  <line x1="380" y1="226" x2="380" y2="244" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="226" x2="170" y2="244" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="570" y1="226" x2="590" y2="244" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Three practices -->
  <rect x="30" y="246" width="200" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="130" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Practice A</text>
  <text x="130" y="280" text-anchor="middle" font-size="10" fill="#166534">Independent PCPs · retains ownership</text>

  <rect x="280" y="246" width="200" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="380" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Practice B</text>
  <text x="380" y="280" text-anchor="middle" font-size="10" fill="#166534">Independent PCPs · retains ownership</text>

  <rect x="530" y="246" width="200" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="630" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Practice C</text>
  <text x="630" y="280" text-anchor="middle" font-size="10" fill="#166534">Independent PCPs · retains ownership</text>

  <!-- Footer -->
  <rect x="30" y="298" width="700" height="6" rx="3" fill="#1e3a8a" opacity="0.15"/>
  <text x="380" y="305" text-anchor="middle" font-size="9" fill="#6b7280">Physicians keep their practice. Aledade earns a share of the savings it generates on their behalf.</text>
</svg>
