<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Aledade vs. Privia — Two Approaches to the Same Problem</title>
  <rect width="740" height="260" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="370" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#111">Aledade vs. Privia — Two Approaches to the Same Problem</text>

  <!-- Header row -->
  <rect x="14" y="40" width="220" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Dimension</text>

  <rect x="242" y="40" width="228" height="32" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="356" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Aledade</text>

  <rect x="478" y="40" width="248" height="32" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="602" y="61" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">Privia Health</text>

  <!-- Row 1: Physician relationship -->
  <rect x="14" y="78" width="220" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="97" text-anchor="middle" font-size="10" fill="#374151">Physician relationship</text>
  <rect x="242" y="78" width="228" height="28" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="356" y="97" text-anchor="middle" font-size="10" fill="#1e3a8a">Independent — practice stays separate</text>
  <rect x="478" y="78" width="248" height="28" rx="4" fill="#fffbeb" stroke="#fef3c7" stroke-width="1"/>
  <text x="602" y="97" text-anchor="middle" font-size="10" fill="#78350f">Affiliated — joins Privia Medical Group</text>

  <!-- Row 2: Physician ownership -->
  <rect x="14" y="112" width="220" height="28" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="131" text-anchor="middle" font-size="10" fill="#374151">Physician ownership</text>
  <rect x="242" y="112" width="228" height="28" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="356" y="131" text-anchor="middle" font-size="10" fill="#1e3a8a">Retains full ownership of practice</text>
  <rect x="478" y="112" width="248" height="28" rx="4" fill="#fffbeb" stroke="#fef3c7" stroke-width="1"/>
  <text x="602" y="131" text-anchor="middle" font-size="10" fill="#78350f">Employed by PC; owns equity in PC</text>

  <!-- Row 3: Primary model -->
  <rect x="14" y="146" width="220" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="165" text-anchor="middle" font-size="10" fill="#374151">Primary model</text>
  <rect x="242" y="146" width="228" height="28" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="356" y="165" text-anchor="middle" font-size="10" fill="#1e3a8a">ACO enabler + MSO platform</text>
  <rect x="478" y="146" width="248" height="28" rx="4" fill="#fffbeb" stroke="#fef3c7" stroke-width="1"/>
  <text x="602" y="165" text-anchor="middle" font-size="10" fill="#78350f">Physician group + MSO platform</text>

  <!-- Row 4: Revenue model -->
  <rect x="14" y="180" width="220" height="28" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="199" text-anchor="middle" font-size="10" fill="#374151">Revenue model</text>
  <rect x="242" y="180" width="228" height="28" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="356" y="199" text-anchor="middle" font-size="10" fill="#1e3a8a">Share of ACO shared savings</text>
  <rect x="478" y="180" width="248" height="28" rx="4" fill="#fffbeb" stroke="#fef3c7" stroke-width="1"/>
  <text x="602" y="199" text-anchor="middle" font-size="10" fill="#78350f">% of physician revenue (MSO fee)</text>

  <!-- Row 5: CPOM structure -->
  <rect x="14" y="214" width="220" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="124" y="233" text-anchor="middle" font-size="10" fill="#374151">CPOM structure</text>
  <rect x="242" y="214" width="228" height="28" rx="4" fill="#eff6ff" stroke="#dbeafe" stroke-width="1"/>
  <text x="356" y="233" text-anchor="middle" font-size="10" fill="#1e3a8a">No physician employment — pure MSO</text>
  <rect x="478" y="214" width="248" height="28" rx="4" fill="#fffbeb" stroke="#fef3c7" stroke-width="1"/>
  <text x="602" y="233" text-anchor="middle" font-size="10" fill="#78350f">State-specific physician PCs</text>
</svg>
