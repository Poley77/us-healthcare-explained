<svg viewBox="0 0 780 370" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Where US Healthcare Dollars Come From</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="780" height="370" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="390" y="42" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Where US Healthcare Dollars Come From</text>

  <!-- ROW 1 -->
  <rect x="22" y="62" width="158" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="101" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Federal</text>
  <text x="101" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Government</text>

  <rect x="198" y="62" width="158" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="277" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">State</text>
  <text x="277" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Governments</text>

  <rect x="374" y="62" width="170" height="70" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="459" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Employers</text>
  <text x="459" y="110" text-anchor="middle" font-size="12" fill="#166534">(+ employees)</text>

  <rect x="562" y="62" width="196" height="70" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="660" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Individuals</text>
  <text x="660" y="110" text-anchor="middle" font-size="12" fill="#92400e">(out-of-pocket)</text>

  <!-- Arrows row 1 → row 2 -->
  <line x1="85"  y1="132" x2="74"  y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="117" y1="132" x2="218" y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="253" y1="132" x2="230" y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="132" x2="356" y2="186" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <line x1="459" y1="132" x2="503" y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="132" x2="680" y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ROW 2 -->
  <rect x="22"  y="190" width="125" height="64" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="84"  y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Medicare</text>
  <text x="84"  y="236" text-anchor="middle" font-size="11" fill="#1e40af">65+ / disabled</text>

  <rect x="160" y="190" width="125" height="64" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="222" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Medicaid</text>
  <text x="222" y="236" text-anchor="middle" font-size="11" fill="#1e40af">low-income</text>

  <rect x="298" y="190" width="125" height="64" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="360" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ACA</text>
  <text x="360" y="236" text-anchor="middle" font-size="11" fill="#1e40af">Marketplaces</text>

  <rect x="436" y="190" width="155" height="64" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="513" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Employer-</text>
  <text x="513" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Sponsored</text>

  <rect x="604" y="190" width="154" height="64" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="681" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Out-of-</text>
  <text x="681" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">pocket</text>

  <!-- Arrows row 2 → bottom -->
  <line x1="84"  y1="254" x2="200" y2="302" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="222" y1="254" x2="270" y2="302" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="254" x2="370" y2="302" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="513" y1="254" x2="470" y2="302" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="681" y1="254" x2="570" y2="302" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BOTTOM BOX -->
  <rect x="22" y="304" width="736" height="52" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="390" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Doctors · Hospitals · Pharmacies · Labs</text>
  <text x="390" y="344" text-anchor="middle" font-size="11" fill="#6d28d9">Care is delivered here</text>
</svg>
