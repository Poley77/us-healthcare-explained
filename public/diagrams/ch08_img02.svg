<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>Without an IPA vs. With an IPA</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="360" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#111">Without an IPA vs. With an IPA</text>

  <!-- Dashed divider -->
  <line x1="360" y1="55" x2="360" y2="290" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- LEFT: Without IPA -->
  <text x="150" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Without IPA</text>

  <rect x="80" y="80" width="140" height="52" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="150" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Health Plan</text>

  <line x1="100" y1="132" x2="60"  y2="178" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="132" x2="150" y2="178" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="132" x2="240" y2="178" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="20"  y="180" width="80" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="60"  y="207" text-anchor="middle" font-size="12" fill="#374151">Dr. A</text>
  <rect x="110" y="180" width="80" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="150" y="207" text-anchor="middle" font-size="12" fill="#374151">Dr. B</text>
  <rect x="200" y="180" width="80" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="240" y="207" text-anchor="middle" font-size="12" fill="#374151">Dr. C</text>

  <text x="150" y="248" text-anchor="middle" font-size="10" fill="#b91c1c">3 contracts · 3 rates · 3 negotiations</text>
  <text x="150" y="264" text-anchor="middle" font-size="10" fill="#b91c1c">No collective bargaining power</text>

  <!-- RIGHT: With IPA -->
  <text x="560" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">With IPA</text>

  <rect x="490" y="80" width="140" height="52" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Health Plan</text>

  <line x1="560" y1="132" x2="560" y2="162" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="468" y="164" width="184" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="560" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">IPA</text>

  <line x1="500" y1="208" x2="460" y2="248" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="560" y1="208" x2="560" y2="248" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="620" y1="208" x2="660" y2="248" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="420" y="250" width="80" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="460" y="275" text-anchor="middle" font-size="12" fill="#14532d">Dr. A</text>
  <rect x="520" y="250" width="80" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="560" y="275" text-anchor="middle" font-size="12" fill="#14532d">Dr. B</text>
  <rect x="620" y="250" width="80" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="660" y="275" text-anchor="middle" font-size="12" fill="#14532d">Dr. C</text>

  <text x="560" y="305" text-anchor="middle" font-size="10" fill="#14532d">1 contract · negotiated rates · shared data</text>
</svg>
