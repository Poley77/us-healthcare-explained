<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img">
  <title>From Raw Data to Clinical Action</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="860" height="340" rx="14" fill="#f8f8f6" stroke="#e2e2dc" stroke-width="1"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">From Raw Data to Clinical Action</text>
  <text x="430" y="46" text-anchor="middle" font-size="11" fill="#6b7280">How data moves from source systems to the decisions that improve care</text>

  <!-- Column headers -->
  <text x="70" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">SOURCES</text>
  <text x="240" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">INGEST &amp; CLEAN</text>
  <text x="450" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">ANALYTICS PLATFORM</text>
  <text x="700" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">OUTPUTS → ACTION</text>

  <!-- Sources (left column) -->
  <rect x="14" y="74" width="110" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="69" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Claims</text>

  <rect x="14" y="114" width="110" height="32" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="69" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">EHR</text>

  <rect x="14" y="154" width="110" height="32" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="69" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Lab / Rx</text>

  <rect x="14" y="194" width="110" height="32" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="69" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">ADT</text>

  <rect x="14" y="234" width="110" height="32" rx="6" fill="#fef9ee" stroke="#fde68a" stroke-width="1.5"/>
  <text x="69" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">SDOH</text>

  <!-- Arrow sources → ETL -->
  <line x1="124" y1="90" x2="158" y2="168" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="124" y1="130" x2="158" y2="168" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="124" y1="170" x2="158" y2="168" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="124" y1="210" x2="158" y2="168" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="124" y1="250" x2="158" y2="168" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ETL Pipeline box -->
  <rect x="158" y="104" width="140" height="128" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="228" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">ETL Pipeline</text>
  <line x1="168" y1="130" x2="288" y2="130" stroke="#e2e8f0" stroke-width="1"/>
  <text x="228" y="145" text-anchor="middle" font-size="9.5" fill="#374151">Normalize formats</text>
  <text x="228" y="159" text-anchor="middle" font-size="9.5" fill="#374151">Deduplicate</text>
  <text x="228" y="173" text-anchor="middle" font-size="9.5" fill="#374151">Match patients</text>
  <text x="228" y="187" text-anchor="middle" font-size="9.5" fill="#374151">across sources</text>
  <text x="228" y="201" text-anchor="middle" font-size="9.5" fill="#374151">(MPI linkage)</text>
  <text x="228" y="215" text-anchor="middle" font-size="9.5" fill="#374151">Validate codes</text>
  <text x="228" y="229" text-anchor="middle" font-size="9.5" fill="#374151">Apply lag offsets</text>

  <!-- Arrow ETL → Data Warehouse -->
  <line x1="298" y1="168" x2="330" y2="168" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Data Warehouse / Analytics Platform -->
  <rect x="330" y="76" width="220" height="184" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Data Warehouse</text>
  <line x1="340" y1="104" x2="540" y2="104" stroke="#bfdbfe" stroke-width="1"/>
  <text x="440" y="120" text-anchor="middle" font-size="9.5" fill="#1e40af">RAF / HCC scoring</text>
  <text x="440" y="134" text-anchor="middle" font-size="9.5" fill="#1e40af">Risk stratification</text>
  <text x="440" y="148" text-anchor="middle" font-size="9.5" fill="#1e40af">Care gap detection</text>
  <text x="440" y="162" text-anchor="middle" font-size="9.5" fill="#1e40af">Quality measure calc</text>
  <text x="440" y="176" text-anchor="middle" font-size="9.5" fill="#1e40af">Cost trend analysis</text>
  <text x="440" y="190" text-anchor="middle" font-size="9.5" fill="#1e40af">Attribution tracking</text>
  <text x="440" y="204" text-anchor="middle" font-size="9.5" fill="#1e40af">Benchmark vs. actual</text>

  <!-- Arrow DW → outputs -->
  <line x1="550" y1="130" x2="578" y2="108" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="160" x2="578" y2="168" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="190" x2="578" y2="220" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="550" y1="215" x2="578" y2="270" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output 1: Population Dashboard -->
  <rect x="578" y="76" width="180" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="668" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">Population Dashboard</text>
  <text x="668" y="115" text-anchor="middle" font-size="9.5" fill="#166534">high-risk patient lists</text>
  <line x1="758" y1="101" x2="786" y2="101" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="800" y="98" text-anchor="start" font-size="9" fill="#6b7280">Care team</text>
  <text x="800" y="110" text-anchor="start" font-size="9" fill="#6b7280">outreach</text>

  <!-- Output 2: Care Gap Worklists -->
  <rect x="578" y="140" width="180" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="668" y="161" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">Care Gap Worklists</text>
  <text x="668" y="179" text-anchor="middle" font-size="9.5" fill="#92400e">outreach tasks for care mgrs</text>
  <line x1="758" y1="165" x2="786" y2="165" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="800" y="162" text-anchor="start" font-size="9" fill="#6b7280">Nurse</text>
  <text x="800" y="174" text-anchor="start" font-size="9" fill="#6b7280">navigator call</text>

  <!-- Output 3: Quality Reports -->
  <rect x="578" y="204" width="180" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="668" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#4c1d95">Quality Reports</text>
  <text x="668" y="243" text-anchor="middle" font-size="9.5" fill="#6d28d9">HEDIS · Stars submissions</text>
  <line x1="758" y1="229" x2="786" y2="229" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="800" y="226" text-anchor="start" font-size="9" fill="#6b7280">Payer quality</text>
  <text x="800" y="238" text-anchor="start" font-size="9" fill="#6b7280">submission</text>

  <!-- Output 4: RAF Coding Alerts -->
  <rect x="578" y="258" width="180" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="668" y="279" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">RAF Coding Alerts</text>
  <text x="668" y="297" text-anchor="middle" font-size="9.5" fill="#991b1b">undocumented HCCs</text>
  <line x1="758" y1="283" x2="786" y2="283" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
  <text x="800" y="280" text-anchor="start" font-size="9" fill="#6b7280">Physician</text>
  <text x="800" y="292" text-anchor="start" font-size="9" fill="#6b7280">chart review</text>

  <!-- Footer -->
  <rect x="14" y="276" width="310" height="52" rx="8" fill="#1e3a8a"/>
  <text x="169" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">The critical constraint: data latency</text>
  <text x="169" y="308" text-anchor="middle" font-size="9" fill="#bfdbfe">Claims arrive 30–90 days after service. EHR data is</text>
  <text x="169" y="320" text-anchor="middle" font-size="9" fill="#bfdbfe">real-time but locked inside the practice's system.</text>
</svg>
